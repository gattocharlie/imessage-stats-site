<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0c0f14">
<title>Infinite Tens</title>
<style>
  /* "late-night arcade scoreboard" — dark, flat, one green accent doing the
     interactive work; gold reserved for trophies / ranks / win numbers. */
  :root {
    --bg: #0c0f14; --card: #151b24; --card-2: #1b2330; --ink: #e9edf4; --dim: #8b95a6;
    --accent: #34e07e; --accent-deep: #0fa958; --accent-ink: #062b16;
    --gold: #ffc94d; --bad: #ff5d6c; --line: #242e3c;
    --glow: rgba(52, 224, 126, .5); /* accent glow — shadows need alpha, so it can't derive from --accent */
    --display: "Avenir Next", "SF Pro Display", -apple-system, "Helvetica Neue", sans-serif;
    --mono: "SF Mono", Menlo, Monaco, monospace;
  }
  /* Light theme: device-local, applied via data-theme on <html> before first
     paint (script start) so there's no dark flash. Same token names — every
     component cascades for free. --accent is #0b8043 (not the requested
     #0fa958, which is only 3.1:1 against white — WCAG AA needs 4.5:1 for the
     small bold seg/button text sitting on it). */
  html[data-theme="light"] {
    --bg: #f4f6f8; --card: #ffffff; --card-2: #eaf3ee; --ink: #17202b; --dim: #5c6675;
    --accent: #0b8043; --accent-deep: #096a37; --accent-ink: #ffffff;
    --gold: #a16207; --bad: #d92d20; --line: #e2e7ee;
    --glow: rgba(11, 128, 67, .3); /* softened on white, like the lock mark */
  }
  html[data-theme="light"] .lock-mark { text-shadow: 0 0 16px rgba(11, 128, 67, .25); } /* softened ∞ glow */
  html[data-theme="light"] .suggest,
  html[data-theme="light"] .bank-sheet,
  html[data-theme="light"] .settings-pop { box-shadow: 0 8px 24px rgba(23, 32, 43, .16); }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font: 16px/1.5 -apple-system, "SF Pro Text", Helvetica, Arial, sans-serif;
    padding: 16px; max-width: 640px; margin: 0 auto;
  }
  h1, h2, summary { font-family: var(--display); }
  h1 { font-size: 1.3rem; margin: 4px 0 2px; }
  h2 { font-size: 1.05rem; margin: 22px 0 8px; }
  .wordmark { text-transform: uppercase; letter-spacing: .08em; }
  .wordmark .mark { color: var(--accent); }
  .num, td.rank, .slot .rank { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .dim { color: var(--dim); font-size: .82rem; }
  button { font-family: inherit; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  /* motion — all three effects are disabled under prefers-reduced-motion (end of file) */
  @keyframes lock-out { to { opacity: 0; transform: scale(.96); visibility: hidden; } }
  @keyframes fade-up { from { opacity: 0; transform: translateY(10px); } }
  @keyframes slot-pop { from { transform: scale(.94); box-shadow: 0 0 14px rgba(52, 224, 126, .55); } }
  @keyframes sheet-up { from { transform: translateY(24px); opacity: 0; } }
  /* lock screen — the brand moment */
  #lock { margin-top: 14vh; text-align: center; }
  .lock-mark {
    font-size: 64px; line-height: 1; color: var(--accent);
    text-shadow: 0 0 26px rgba(52, 224, 126, .5);
  }
  #lock h1 { font-size: 1.35rem; margin: 12px 0 4px; }
  .tagline { color: var(--dim); font-size: .85rem; margin: 0 0 22px; }
  #lock input {
    width: 100%; max-width: 320px; padding: 12px 14px; font-size: 1rem;
    border-radius: 10px; border: 1px solid var(--line);
    background: var(--card); color: var(--ink);
  }
  #lock input:focus { border-color: var(--accent); }
  #lock button {
    margin-top: 10px; padding: 12px 28px; font-size: 1rem; border-radius: 10px;
    border: 0; background: var(--accent); color: var(--accent-ink); font-weight: 700;
  }
  #lock button:disabled { opacity: .6; }
  #lockErr { color: var(--bad); margin-top: 10px; min-height: 1.2em; font-size: .9rem; }
  /* unlock transition: .out overlays and fades the lock away while #app
     fades up beneath it (restarts naturally when .hidden is removed) */
  #lock.out {
    position: fixed; inset: 0; margin: 0; padding-top: 14vh; background: var(--bg);
    pointer-events: none; animation: lock-out .25s ease-out forwards;
  }
  #app:not(.hidden) { animation: fade-up .25s ease-out; }
  /* segmented control */
  .seg { display: flex; gap: 6px; margin: 14px 0 6px; }
  .seg button {
    flex: 1; padding: 8px 0; border-radius: 999px; border: 1px solid var(--line);
    background: var(--card); color: var(--dim); font-size: .85rem;
  }
  .seg button.on { background: var(--accent); color: var(--accent-ink); font-weight: 700; border-color: var(--accent); }
  /* dropdown control row (dropdowns/portal plan U1): three native selects
     wearing one designed skin — eyebrow label, custom chevron, card chrome.
     Platform picker variance hides inside the picker itself. */
  .ddrow { display: flex; gap: 8px; margin: 16px 0 6px; }
  .dd {
    flex: 1; min-width: 0; position: relative;
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 6px 10px 5px;
  }
  .dd:focus-within { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .dd label {
    display: block; font-size: .62rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .12em; color: var(--dim); pointer-events: none;
  }
  .dd select {
    width: 100%; border: 0; background: transparent; color: var(--ink);
    font: inherit; font-size: .88rem; font-weight: 600; padding: 1px 14px 0 0;
    appearance: none; -webkit-appearance: none;
  }
  .dd select:focus { outline: none; } /* the wrapper's focus-within ring carries focus */
  .dd::after {
    content: ""; position: absolute; right: 12px; bottom: 14px;
    width: 6px; height: 6px; pointer-events: none;
    border-right: 2px solid var(--dim); border-bottom: 2px solid var(--dim);
    transform: rotate(45deg);
  }
  /* tables */
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; margin: 8px 0; overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; min-width: 280px; }
  th, td { text-align: left; padding: 7px 10px 7px 0; white-space: nowrap; }
  th { color: var(--dim); font-size: .74rem; text-transform: uppercase; letter-spacing: .06em; cursor: pointer; user-select: none; }
  tr + tr td { border-top: 1px solid var(--line); }
  td.rank { color: var(--gold); font-weight: 700; width: 2em; }
  .hidden { display: none !important; }
  details { margin: 18px 0; }
  summary { font-size: 1.05rem; font-weight: 700; cursor: pointer; padding: 6px 0; }
  svg { display: block; width: 100%; height: auto; margin: 6px 0; }
  /* bar charts pick their colors up from the tokens (not baked-in hex), so a
     theme toggle restyles them with zero re-render */
  .bar-label { fill: var(--dim); }
  .bar-val { fill: var(--ink); }
  .bar-rect { fill: var(--accent); stroke: var(--accent-deep); stroke-width: 1; }
  /* header row: wordmark left, actions (∞ portal + settings gear) right */
  .hdr { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .hdr-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  /* ∞ portal (dropdowns/portal plan U3): the doorway to Infinite Tens, left
     of the gear. Slow subtle accent pulse, idle; a saved round upgrades the
     pulse and adds a dot badge. The global prefers-reduced-motion rule
     stills the animation — the static base glow remains. */
  .portal {
    position: relative; width: 40px; height: 40px; padding: 0; flex-shrink: 0;
    border: 1px solid var(--line); border-radius: 10px; background: transparent;
    color: var(--accent); font-size: 1.35rem; line-height: 1;
    text-shadow: 0 0 10px var(--glow);
    animation: portal-pulse 3.2s ease-in-out infinite;
  }
  .portal.live { border-color: var(--accent); animation-duration: 1.4s; }
  .portal .dot {
    position: absolute; top: -4px; right: -4px; width: 10px; height: 10px;
    border-radius: 50%; background: var(--accent); border: 2px solid var(--bg);
  }
  @keyframes portal-pulse {
    0%, 100% { box-shadow: 0 0 0 transparent; text-shadow: 0 0 6px var(--glow); }
    50% { box-shadow: 0 0 14px var(--glow); text-shadow: 0 0 16px var(--glow); }
  }
  .settings { position: relative; flex-shrink: 0; }
  .gear {
    width: 40px; height: 40px; padding: 0; border: 1px solid var(--line);
    border-radius: 10px; background: transparent; color: var(--dim); font-size: 1.15rem;
  }
  .settings-pop {
    position: absolute; right: 0; top: calc(100% + 6px); z-index: 20;
    width: 190px; margin: 0; overflow: visible;
    box-shadow: 0 8px 24px rgba(0, 0, 0, .45);
  }
  .settings-pop .seg { margin: 8px 0 2px; }
  .note { color: var(--dim); font-style: italic; padding: 8px 0; }
  /* stat explainers: hover via title attr, tap-to-toggle for touch */
  .stat-h { cursor: pointer; }
  .stat-h .info { color: var(--dim); font-size: .72em; font-weight: 400; letter-spacing: 0; }
  .stat-desc { font-size: .8rem; padding: 0 0 6px; margin-top: -4px; }
  /* ---- Player profiles (profiles plan U2-U4) ---- */
  .plink {
    background: none; border: none; padding: 0; font: inherit; color: var(--accent);
    cursor: pointer; text-decoration: underline dotted; text-underline-offset: 3px;
  }
  .profile-strip { display: flex; flex-wrap: wrap; gap: 4px 16px; color: var(--dim); font-size: .85rem; margin: 4px 0 6px; }
  .profile-strip b { color: var(--ink); font-weight: 700; }
  .facts { display: grid; gap: 8px; margin: 10px 0 4px; }
  .fact {
    background: var(--card-2); border: 1px solid var(--line); border-left: 3px solid var(--accent);
    border-radius: 10px; padding: 10px 12px; font-size: .92rem; line-height: 1.45;
  }
  .fact.rare { border-left-color: var(--gold); }
  /* ---- Play view: round screen + end screen (game plan U3) ---- */
  .round-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-top: 14px; }
  .round-head h2 { margin: 0 0 2px; }
  .round-controls { display: flex; gap: 6px; flex-shrink: 0; }
  .slots {
    display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(5, auto);
    grid-auto-flow: column; gap: 6px; margin: 12px 0 8px;
  }
  .slot {
    display: flex; align-items: center; gap: 8px; min-height: 42px; padding: 6px 10px;
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    font-size: .88rem; overflow: hidden;
  }
  .slot .rank { color: var(--gold); font-weight: 700; min-width: 1.3em; text-align: right; }
  .slot.blank .rank { color: var(--dim); }
  .slot .ans { white-space: normal; overflow-wrap: anywhere; }
  .slot.blank .ans { color: var(--line); }
  .slot.found { border-color: var(--accent); background: var(--card-2); }
  .slot.pop { animation: slot-pop .25s ease-out; }
  .slot.miss .ans { color: var(--dim); }
  .hearts { font-size: 1.15rem; letter-spacing: 3px; color: var(--bad); margin: 2px 0 8px; }
  .hearts .lost { color: var(--dim); }
  .guessbar { position: sticky; bottom: 0; background: var(--bg); padding: 8px 0 4px; z-index: 17; }
  .guessrow { display: flex; gap: 8px; position: relative; }
  .guessrow input {
    flex: 1; min-width: 0; padding: 11px 13px; font-size: 1rem;
    border-radius: 10px; border: 1px solid var(--line); background: var(--card); color: var(--ink);
  }
  .guessrow input:focus { border-color: var(--accent); }
  /* layout only — visual styling comes from .btn.primary on the button */
  .guessrow > button { padding: 0 18px; }
  .suggest {
    position: absolute; bottom: calc(100% + 6px); left: 0; right: 0;
    max-height: 228px; overflow-y: auto; background: var(--card);
    border: 1px solid var(--line); border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, .45); z-index: 5;
  }
  .suggest button {
    display: block; width: 100%; text-align: left; padding: 10px 13px;
    border: 0; background: none; color: var(--ink); font-size: .95rem;
  }
  .suggest button + button { border-top: 1px solid var(--line); }
  .nodict { font-size: .78rem; margin-bottom: 6px; }
  .feedback { min-height: 1.3em; font-size: .85rem; margin-top: 6px; color: var(--dim); }
  .feedback.bad { color: var(--bad); }
  .giveup {
    padding: 6px 12px; border-radius: 9px; border: 1px solid var(--line);
    background: var(--card); color: var(--dim); font-size: .8rem; white-space: nowrap;
  }
  .giveup.armed { border-color: var(--bad); color: var(--bad); font-weight: 700; }
  .resume { border-color: var(--accent); }
  .resume-actions { display: flex; gap: 8px; margin-top: 10px; }
  /* U6 share fallback: selectable text block when share/clipboard are unavailable */
  .share-block {
    user-select: all; -webkit-user-select: all;
    margin-top: 10px; padding: 10px 12px; font: inherit; white-space: pre-wrap;
    background: var(--card-2); border: 1px dashed var(--line); border-radius: 10px;
  }
  .btn {
    padding: 9px 18px; border-radius: 10px; border: 1px solid var(--line);
    background: transparent; color: var(--ink); font-size: .9rem;
  }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); font-weight: 700; }
  .score { color: var(--gold); }
  /* ---- Play view: catalog (game plan U4) ---- */
  .cat-controls { display: flex; gap: 8px; margin: 14px 0 10px; }
  .cat-controls input {
    flex: 1; min-width: 0; padding: 10px 13px; font-size: 1rem;
    border-radius: 10px; border: 1px solid var(--line); background: var(--card); color: var(--ink);
  }
  .cat-controls input:focus { border-color: var(--accent); }
  .cat-controls .btn, .cat-main .btn { min-height: 40px; white-space: nowrap; }
  .cat-row { padding: 12px; }
  .cat-main { display: flex; gap: 10px; align-items: center; }
  .cat-info { flex: 1; min-width: 0; }
  .cat-q { font-size: .92rem; margin-top: 2px; overflow-wrap: anywhere; }
  .played { color: var(--accent); font-weight: 700; }
  .reveal {
    display: block; width: 100%; min-height: 40px; margin-top: 8px; padding: 8px 0;
    border: 1px dashed var(--line); border-radius: 9px; background: none;
    color: var(--dim); font-size: .82rem;
  }
  .cat-key { margin-top: 4px; }
  .cat-key .slots { margin: 8px 0; }
  .cat-res { margin-top: 6px; font-size: .88rem; }
  .cat-res .row { padding: 5px 0; }
  .cat-res .row + .row { border-top: 1px solid var(--line); }
  .more { display: block; width: 100%; min-height: 44px; margin: 10px 0; }
  /* ---- catalog pins: Puzzle of the Week + On This Day (rituals U3/U4) ----
     PotW eyebrow + border are gold — a weekly honor (gold = honors rule);
     On This Day stays dim: it's nostalgia, not a trophy. */
  .pin { margin: 14px 0 4px; }
  .pin-eyebrow {
    font-size: .68rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .14em; color: var(--dim); margin-bottom: 2px;
  }
  .pin-potw .pin-eyebrow { color: var(--gold); }
  .pin-potw .cat-row { border-color: var(--gold); }
  /* Today's Action landing card (dropdowns/portal plan U4): accent — it's a
     live race, an interactive-energy moment, not an honor (gold stays for
     trophies). */
  .pin-today .pin-eyebrow { color: var(--accent); }
  .pin-today .card { border-color: var(--accent); }
  /* ---- Answer bank (U8): green + button and bottom sheet ---- */
  #bankBtn {
    flex: 0 0 40px; width: 40px; height: 40px; padding: 0; align-self: center;
    border: 0; border-radius: 50%; background: var(--accent); color: var(--accent-ink);
    font-size: 1.5rem; font-weight: 700; line-height: 1;
  }
  /* Anchored inside .guessrow exactly like .suggest (not viewport-fixed): the
     guess bar is sticky and can float mid-viewport with short content or the
     iOS keyboard, so a fixed sheet offset by the bar's height could hide rows
     behind the bar. Absolute above the row can never cover the input. */
  .bank-sheet {
    position: absolute; bottom: calc(100% + 6px); left: 0; right: 0; z-index: 16;
    max-height: min(55vh, 420px); overflow-y: auto; display: flex; flex-direction: column;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; box-shadow: 0 8px 24px rgba(0, 0, 0, .45);
    animation: sheet-up .2s ease-out;
  }
  .bank-head { display: flex; gap: 8px; align-items: center; padding: 10px 10px 8px; border-bottom: 1px solid var(--line); }
  .bank-head input {
    flex: 1; min-width: 0; padding: 9px 12px; font-size: .95rem;
    border-radius: 10px; border: 1px solid var(--line); background: var(--bg); color: var(--ink);
  }
  .bank-head input:focus { border-color: var(--accent); }
  .bank-close {
    flex: 0 0 36px; width: 36px; height: 36px; padding: 0; border-radius: 50%;
    border: 1px solid var(--line); background: var(--card-2); color: var(--dim); font-size: .95rem;
  }
  .bank-list { overflow-y: auto; padding: 4px 10px 12px; }
  .bank-list > button {
    display: block; width: 100%; text-align: left; padding: 10px 8px;
    border: 0; background: none; color: var(--ink); font-size: .95rem;
  }
  .bank-list > button + button { border-top: 1px solid var(--line); }
  .bank-list > button.more { text-align: center; border: 1px solid var(--line); border-radius: 10px; margin: 10px 0; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
    #lock.out { display: none; }
  }
</style>
</head>
<body>
<div id="lock">
  <div class="lock-mark" aria-hidden="true">∞</div>
  <h1 class="wordmark">Infinite Tens</h1>
  <p class="tagline">every puzzle. forever.</p>
  <input id="pass" type="password" autocomplete="current-password" inputmode="text" placeholder="passcode" aria-label="Group passcode">
  <div><button id="unlock">Unlock</button></div>
  <div id="lockErr"></div>
</div>
<div id="app" class="hidden"></div>

const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function decrypt(pass) {
  const km = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64d(ENC.salt), iterations: ENC.iterations, hash: "SHA-256" },
    km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: b64d(ENC.nonce) }, key, b64d(ENC.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

const $ = (sel, el) => (el || document).querySelector(sel);
const el = (tag, attrs, ...kids) => {
  const node = document.createElement(tag);
  Object.entries(attrs || {}).forEach(([k, v]) => k === "text" ? node.textContent = v : node.setAttribute(k, v));
  kids.flat().forEach(kid => node.append(kid));
  return node;
};

let WIN = "all"; // Time dropdown — daily games are one-a-day: all-time is the fun default
let VIEW = "stats"; // active area: "stats" (boards + dropdowns) or "play" (Infinite Tens)
let GAME = "overall"; // Game dropdown — "overall" or a tracked game key from DATA.games
let PLAYER = null; // Player dropdown — null = Everyone
// Play-view state, module-scope on purpose: render() rebuilds #app from
// scratch, so anything that must survive a re-render lives out here.
let ROUND = null; // U3: in-progress round {puzzle, slots, hearts, guessed} — module scope so re-renders never lose it (R17)
let PENDING_START = null; // U3: puzzle number waiting to start behind the give-up confirm (two-tap)
let SEARCH = ""; // U4: catalog search text — module scope so partial updates never reset the input
let REVEALED = new Set(); // U4: puzzle numbers whose answer keys are revealed (spoiler gate, R13/AE5)
let COLLAPSED = new Set(); // U4: revealed rows the user folded back up — purely visual; membership in REVEALED is permanent
const CATALOG_CHUNK = 60; // U4: windowed rendering — rows appended per "Show more"
let CATALOG_SHOW = CATALOG_CHUNK; // U4: current window size; resets when the search text changes
// U8: answer-bank sheet — mirrors the real site's green "+" button: browsing
// costs nothing; a tapped entry goes through submit(), so a miss still costs
// a heart. Module scope so partial re-renders never strand an open sheet;
// closed explicitly on round end / give-up / view switch.
let BANK_OPEN = false;
let BANK_SEARCH = ""; // sheet's own search text — survives repaints
const BANK_CHUNK = 80; // windowed rendering: dictionary lists can reach ~2000 entries
let BANK_SHOW = BANK_CHUNK;

// Current puzzle day in ET as YYYY-MM-DD (en-CA locale formats ISO-style) —
// U4 uses this for client-side today-exclusion (plan R19).
const etPuzzleDay = () =>
  new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York" }).format(new Date());

// Feature detection: the Play view exists only once the payload carries the
// puzzle archive (U2 adds DATA.archive). Until then behavior is identical to
// the pre-catalog page.
const catalogAvailable = () => !!(DATA && DATA.archive);

// JS mirror of render.normalize_guess — keep the two in lockstep (see the
// render.py docstring): lowercase, NFKD-decompose, keep letters/digits only.
// Run against the payload's pre-normalized dictionary match forms, so the
// autocomplete filter and free-text matching share one canonical form (R16).
const normalizeGuess = s =>
  String(s).toLowerCase().normalize("NFKD").replace(/[^\p{L}\p{N}]/gu, "");

// ---- device-local storage (U5, plan R17/R18) ------------------------------
// Namespaced, versioned, lossy-safe localStorage layer. Purely device-local:
// no identity concept, no reconciliation with shared data, no cross-device
// anything. Eviction/clearing drift is an ACCEPTED trade-off (R18 lossy
// posture) — the page must be fully functional with zero persistence.
//
// Key layout (consumed by U3/U4):
//   infinitetens:v1:done   -> { "<puzzleNumber>": bestScore, ... }
//        Completion map: one integer best score per puzzle number.
//        Presence of a key == played (drives U4's played glyph and the
//        Random unplayed-preference); the value is the best score ever
//        achieved on this device (R8/AE4 — a worse replay never lowers it).
//   infinitetens:v1:round  -> serialized in-progress ROUND
//        { puzzle: N, slots: [indices found], hearts: N, guessed: [...] }
//        Saved by U3 on every ROUND mutation; loaded on resume-after-unlock;
//        cleared on finish or give-up (abandoning records nothing, R17).
//
// v1 -> v2 migration path (stub — implement only when v2 exists):
//   read each infinitetens:v1:* key, transform to the v2 shape, write the
//   infinitetens:v2:* key, then delete the v1 key. Run once at load, inside
//   the same try/catch posture as everything else here.
//
// Plaintext by accepted, documented trade-off (R18): stored values are
// scores, flags, and round state ONLY — never answer KEY text, names, or any
// chat-derived data. The round save's `guessed` array holds normalized forms
// of the player's OWN typed guesses (self-entered text, needed for
// repeat-rejection across resume — acceptable); text originating from
// DATA's answer keys must never be written to storage.
//
// Every access is wrapped: quota errors, private browsing (iOS Safari throws
// on setItem), disabled storage, and JSON corruption all degrade to nulls /
// false — nothing here ever throws into the page.
const STORE_DONE = "infinitetens:v1:done";
const STORE_ROUND = "infinitetens:v1:round";
const STORE_THEME = "infinitetens:v1:theme"; // "light" | "dark" — device-local, same lossy posture
const STORE_EDDIE = "infinitetens:v1:eddieMode"; // bool — per-viewer percentile tie-break lens, off by default
// Eddie Mode: display-only lens. When true, boards show the wins_eddie tally
// (Daily Tens ties broken by highest end-screen percentile) instead of wins.
// Missing key -> undefined !== true -> off, the intended default.
let EDDIE_MODE = storageGet(STORE_EDDIE) === true;

function storageGet(key) {
  try {
    const raw = localStorage.getItem(key);
    if (raw === null) return null;
    return JSON.parse(raw);
  } catch (e) {
    // Corrupted JSON (or storage unreadable): treat as absent and clear the
    // bad key best-effort so it can't re-corrupt future reads.
    try { localStorage.removeItem(key); } catch (e2) { /* zero-persistence mode */ }
    return null;
  }
}

function storageSet(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (e) {
    return false; // quota / private mode / disabled — page keeps working
  }
}

function storageRemove(key) {
  try {
    localStorage.removeItem(key);
    return true;
  } catch (e) {
    return false;
  }
}

// ---- theme (device-local) --------------------------------------------------
// Dark is the default (no data-theme attribute); "light" flips every token
// via the html[data-theme="light"] override — components restyle by cascade,
// no re-render needed. The browser chrome color (<meta name="theme-color">)
// is synced on load AND on every toggle.
const THEME_META_COLORS = { dark: "#0c0f14", light: "#f4f6f8" };

const currentTheme = () =>
  document.documentElement.dataset.theme === "light" ? "light" : "dark";

function applyTheme(theme) {
  if (theme === "light") document.documentElement.dataset.theme = "light";
  else delete document.documentElement.dataset.theme;
  const meta = $('meta[name="theme-color"]');
  if (meta) meta.setAttribute("content", THEME_META_COLORS[theme === "light" ? "light" : "dark"]);
}

// Applied at script parse time — before the lock screen is interactive and
// before any render — so a light-theme device never flashes dark.
applyTheme(storageGet(STORE_THEME) === "light" ? "light" : "dark");

// Settings popover open-state lives at module scope so a re-render (window
// seg, chips, tab switch) can restore an open popover instead of stranding it.
let SETTINGS_OPEN = false;

// Outside tap closes the popover. One document-level listener, registered
// once; the popover/gear are re-queried because render() rebuilds them.
document.addEventListener("pointerdown", e => {
  if (!SETTINGS_OPEN) return;
  if (e.target instanceof Element && e.target.closest(".settings")) return;
  SETTINGS_OPEN = false;
  const pop = $(".settings-pop");
  const gear = $(".gear");
  if (pop) pop.classList.add("hidden");
  if (gear) gear.setAttribute("aria-expanded", "false");
});

// Outside tap closes the answer bank — same pattern as the settings popover
// above (replaces the old full-screen backdrop element). The sheet lives
// inside .guessrow, so one closest() check covers the sheet, the + button,
// and the input row; the nodes are re-queried because the round screen
// rebuilds them. Suggestions resume on the next input event.
document.addEventListener("pointerdown", e => {
  if (!BANK_OPEN) return;
  if (e.target instanceof Element && e.target.closest(".guessrow")) return;
  BANK_OPEN = false;
  const sheet = $(".bank-sheet");
  const bankBtn = $("#bankBtn");
  if (sheet) sheet.classList.add("hidden");
  if (bankBtn) bankBtn.setAttribute("aria-expanded", "false");
});

// -- completion map API (U4: played glyph + Random preference; U3: end screen)
function bestScore(puzzle) {
  const done = storageGet(STORE_DONE);
  if (!done || typeof done !== "object") return null;
  const v = done[String(puzzle)];
  return typeof v === "number" ? v : null;
}

function hasPlayed(puzzle) {
  return bestScore(puzzle) !== null;
}

// Record a finished round's score, keeping the BEST (R8/AE4 — a worse replay
// never lowers a recorded best). Returns true if storage accepted the write.
function recordScore(puzzle, score) {
  if (typeof score !== "number") return false;
  const done = storageGet(STORE_DONE);
  const map = done && typeof done === "object" && !Array.isArray(done) ? done : {};
  const prev = map[String(puzzle)];
  if (typeof prev === "number" && prev >= score) return true; // best already kept
  map[String(puzzle)] = score;
  return storageSet(STORE_DONE, map);
}

// -- in-progress round save (U3: every ROUND mutation / resume / give-up)
function saveRound(round) {
  if (!round || typeof round !== "object") return false;
  return storageSet(STORE_ROUND, round);
}

function loadRound() {
  const saved = storageGet(STORE_ROUND);
  // Minimal shape check so a stale/foreign value can't crash resume; anything
  // malformed is treated as no save (and cleared, per lossy posture).
  if (!saved || typeof saved !== "object" || typeof saved.puzzle !== "number") {
    if (saved !== null) storageRemove(STORE_ROUND);
    return null;
  }
  return saved;
}

function clearRound() {
  return storageRemove(STORE_ROUND);
}

function table(cols, rows, ranked) {
  const t = el("table");
  const head = el("tr");
  cols.forEach((c, i) => {
    const th = el("th", { text: c.label });
    th.onclick = () => {
      rows.sort((a, b) => (a[c.key] > b[c.key] ? 1 : -1) * (c.desc ? -1 : 1));
      c.desc = !c.desc;
      redrawBody();
    };
    head.append(th);
  });
  t.append(head);
  function redrawBody() {
    t.querySelectorAll("tr:not(:first-child)").forEach(r => r.remove());
    rows.forEach((row, i) => {
      const tr = el("tr", row.player && PLAYER && row.player !== PLAYER ? { class: "hidden" } : {});
      if (ranked) tr.append(el("td", { class: "rank", text: i + 1 }));
      // numerals get the mono .num treatment (scoreboard typography)
      cols.forEach(c => {
        const td = el("td", { class: typeof row[c.key] === "number" ? "num" : "" });
        if (c.link && row[c.key] != null) {
          // opt-in per-column tap target — player columns pass link to set
          // the Player dropdown (dropdowns/portal plan U2)
          const b = el("button", { class: "plink", type: "button", text: row[c.key] });
          b.onclick = () => c.link(row);
          td.append(b);
        } else {
          td.textContent = row[c.key] ?? "";
        }
        tr.append(td);
      });
      t.append(tr);
    });
  }
  if (ranked) head.prepend(el("th", { text: "#" }));
  redrawBody();
  return t;
}

function barChart(pairs) {
  // pairs: [[label, value]] — horizontal bars
  const max = Math.max(1, ...pairs.map(p => p[1]));
  const rowH = 26, w = 560;
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", `0 0 ${w} ${pairs.length * rowH}`);
  pairs.forEach(([label, value], i) => {
    const y = i * rowH;
    const bw = Math.max(2, (value / max) * (w - 170));
    // colors come from CSS classes bound to the theme tokens (.bar-label /
    // .bar-rect / .bar-val) — never baked-in hex, so a theme toggle restyles
    // already-rendered charts by cascade alone
    svg.innerHTML +=
      `<text x="0" y="${y + 17}" class="bar-label" font-size="13">${label}</text>` +
      `<rect x="110" y="${y + 4}" width="${bw}" height="16" rx="4" class="bar-rect"></rect>` +
      `<text x="${114 + bw}" y="${y + 17}" class="bar-val" font-size="13">${value}</text>`;
  });
  return svg;
}

// ---- post-decrypt init (dropdowns/portal plan U1) ---------------------------
// One-time pass after every successful decrypt — the side effects the old
// view registry used to carry. render() handles area-level navigation only;
// per-keystroke / per-guess changes call updatePlay() directly (the in-place
// patch seam that must NOT clear #app) so inputs keep focus and round state
// stays on screen (plan KTD: module-scope view state + partial updates).
function initAfterDecrypt() {
  if (catalogAvailable()) {
    // pre-lowercase each question for the catalog search filter
    DATA.archive.forEach(r => { r._ql = r.q.toLowerCase(); });
  }
  // memos built from a previous DATA payload must drop with it
  ELIGIBLE_CACHE = { day: null, rows: [] };
  POTW = { week: null, pick: null };
}

function renderPlay(container) {
  // Stable root for in-place patching: the round screen (U3) and the catalog
  // (U4) build inside #playRoot and mutate it via updatePlay() instead of
  // full render() rebuilds — so a round in progress is never lost to a
  // tab-level rebuild (R17) and the guess input keeps focus.
  const root = el("div", { id: "playRoot" });
  container.append(root);
  buildPlayBody(root);
}

function updatePlay() {
  // Partial-update seam (plan KTD): screen-level transitions inside Play
  // (start / resume / give up / finish) rebuild #playRoot only. Per-guess
  // mutations never come through here — they use the targeted patchers
  // inside buildRoundScreen (slots / hearts / suggestions / feedback) so the
  // input keeps focus. Falling back to render() covers being called while
  // another view is active.
  const root = $("#playRoot");
  if (!root) { render(); return; }
  buildPlayBody(root);
}

function buildPlayBody(root) {
  root.textContent = "";
  if (ROUND) buildRoundScreen(root);
  else buildCatalog(root);
}

// ---- round engine (U3 — plan R16/R17; origin R4/R5/R7; flow F2) -----------

const puzzleByNumber = n =>
  (catalogAvailable() && DATA.archive.find(r => r.n === n)) || null;

const metaLine = row =>
  `Infinite Tens #${row.n} · ${row.d}` + (row.t ? ` · ${row.t}` : "");

// Load the saved round only if it still makes sense against the current
// archive; anything malformed or already-terminal is discarded and cleared
// (accepted lossy posture, R18) so a stale save can never crash resume.
function loadValidRound() {
  const saved = loadRound();
  if (!saved) return null;
  const row = puzzleByNumber(saved.puzzle);
  const ok = !!row &&
    Number.isInteger(saved.hearts) && saved.hearts >= 1 && saved.hearts <= 5 &&
    Array.isArray(saved.slots) &&
    saved.slots.every(i => Number.isInteger(i) && i >= 0 && i < row.a.length) &&
    new Set(saved.slots).size === saved.slots.length &&
    saved.slots.length < row.a.length &&
    Array.isArray(saved.guessed) && saved.guessed.every(g => typeof g === "string");
  if (!ok) { clearRound(); return null; }
  return saved;
}

// Entry point for picking a puzzle — U4's catalog rows and Random button
// call exactly startRound(row.n). If a *different* round is active or saved,
// starting routes through the give-up confirm (PENDING_START holds the
// requested puzzle; the give-up button renders pre-armed so the pick itself
// counted as the first tap of the two-tap confirm).
function startRound(n) {
  const row = puzzleByNumber(n);
  if (!row) return;
  const existing = ROUND || loadValidRound();
  if (existing && existing.puzzle !== n) {
    PENDING_START = n;
    goPlay();
    return;
  }
  PENDING_START = null; // proceeding directly — clear any stale pending pick (mirrors the banner Resume)
  ROUND = existing || { puzzle: n, slots: [], hearts: 5, guessed: [] };
  saveRound(ROUND);
  goPlay();
}

// Navigate into the Play view: partial update when already there (never a
// full render() mid-round); full render only as tab-level navigation.
function goPlay() {
  if (VIEW === "play" && $("#playRoot")) updatePlay();
  else { VIEW = "play"; render(); }
}

// Give-up confirm: two-tap pattern (window.confirm and other dialogs are
// forbidden). First tap arms the button, second tap confirms. Abandoning
// records NOTHING (R17) — no score write, no reveal.
function wireGiveUp(btn) {
  const arm = () => { btn.classList.add("armed"); btn.textContent = "Really give up?"; };
  if (PENDING_START !== null) arm();
  btn.onclick = () => {
    if (!btn.classList.contains("armed")) { arm(); return; }
    clearRound();
    ROUND = null;
    BANK_OPEN = false; BANK_SEARCH = ""; // round over — never strand the sheet
    const next = PENDING_START;
    PENDING_START = null;
    if (next !== null) startRound(next);
    else updatePlay();
  };
}

// ---- catalog (U4 — plan R18/R19; origin R1/R2/R3/R6/R13; AE1/AE5) ---------

// Non-today archive rows, newest first. Memoized by ET day: the archive is
// static after decrypt, so the filter/sort is recomputed only when
// etPuzzleDay() rolls over — which preserves the midnight-rollover behavior
// (R19/AE1): a page left open past ET midnight recomputes on its next update
// and admits the new day's row. Archive rows arrive date-sorted ascending;
// string compare works because d is ISO YYYY-MM-DD.
let ELIGIBLE_CACHE = { day: null, rows: [] };
function eligibleRows() {
  const today = etPuzzleDay();
  if (ELIGIBLE_CACHE.day !== today) {
    ELIGIBLE_CACHE = {
      day: today,
      rows: DATA.archive
        .filter(r => r.d < today)
        .sort((a, b) => (a.d < b.d ? 1 : a.d > b.d ? -1 : b.n - a.n)),
    };
  }
  return ELIGIBLE_CACHE.rows;
}

// ---- catalog pins (rituals plan U3/U4 — R4/R5) -----------------------------
// Puzzle of the Week is a pure function of the ISO week over a WEEK-STABLE
// row set: candidates are archive rows dated before this ISO week's Monday
// (ET) — a set that cannot change mid-week no matter how many scheduled
// top-ups or redeploys land — so every device agrees all week with no
// coordination. Never today's puzzle by construction (Monday ≤ today).

// ISO 8601 week for an ET day string (Monday-start; the week that contains
// Thursday owns the year). All math in UTC so the viewer's local timezone
// never bleeds in. Returns the week key ("2026-W28") and Monday's date.
function isoWeekParts(dayStr) {
  const [y, m, d] = dayStr.split("-").map(Number);
  const date = new Date(Date.UTC(y, m - 1, d));
  const dow = date.getUTCDay() || 7; // Monday=1 … Sunday=7
  const monday = new Date(date);
  monday.setUTCDate(date.getUTCDate() - (dow - 1));
  const thu = new Date(date);
  thu.setUTCDate(date.getUTCDate() + 4 - dow);
  const week = Math.ceil(((thu - Date.UTC(thu.getUTCFullYear(), 0, 1)) / 86400000 + 1) / 7);
  return {
    key: thu.getUTCFullYear() + "-W" + String(week).padStart(2, "0"),
    monday: monday.toISOString().slice(0, 10),
  };
}

// Deterministic 32-bit string hash (djb2 xor-free variant) — every browser
// agrees on the arithmetic, which is all a fun weekly rotation needs.
const weekHash = key => {
  let h = 5381;
  for (let i = 0; i < key.length; i++) h = (Math.imul(h, 33) + key.charCodeAt(i)) >>> 0;
  return h;
};

let POTW = { week: null, pick: null }; // memo — recomputed only when the ISO week rolls
let PINS_DAY = null; // ET day the pins were built for — patchList's rollover guard
function potwPick() {
  const { key, monday } = isoWeekParts(etPuzzleDay());
  if (POTW.week !== key) {
    const cands = DATA.archive.filter(r => r.d < monday);
    POTW = { week: key, pick: cands.length ? cands[weekHash(key) % cands.length] : null };
  }
  return POTW.pick;
}

// On This Day (U4): the archive row dated exactly one year ago, by ET-day
// string math (Feb 29 falls back to Feb 28). Absent → null → no pin, silently.
function onThisDayRow() {
  const [y, m, d] = etPuzzleDay().split("-");
  const day = m === "02" && d === "29" ? "28" : d;
  const target = (Number(y) - 1) + "-" + m + "-" + day;
  return DATA.archive.find(r => r.d === target) || null;
}

function buildCatalog(root) {
  // Resume banner (R17) stays above the browse list.
  const saved = loadValidRound();
  if (saved) {
    const banner = el("div", { class: "card resume" });
    banner.append(el("div", {
      text: `Resume puzzle #${saved.puzzle} — ${saved.slots.length}/10 found, ` +
        "♥".repeat(saved.hearts) + " left",
    }));
    const actions = el("div", { class: "resume-actions" });
    const resume = el("button", { class: "btn primary", text: "Resume" });
    resume.onclick = () => {
      PENDING_START = null;
      // re-check storage at click time: the banner's `saved` is a snapshot,
      // and the round may have finished / changed in another tab since —
      // resurrecting it would fork device state. Stale? rebuild the catalog.
      const current = loadValidRound();
      if (!current || current.puzzle !== saved.puzzle) { updatePlay(); return; }
      ROUND = current;
      saveRound(ROUND);
      updatePlay();
    };
    const giveup = el("button", { class: "giveup", text: "Give up" });
    wireGiveUp(giveup);
    actions.append(resume, giveup);
    banner.append(actions);
    root.append(banner);
  }

  // Pinned rituals (U3/U4) sit above the search controls, as part of the
  // one-time catalog build — patchList repaints never touch them, so they
  // can't duplicate; an ET-day rollover rebuilds the whole catalog instead
  // (patchList's PINS_DAY guard below). Both embed the standard catalogRow,
  // so the reveal gate and Play button work exactly like any list row.
  PINS_DAY = etPuzzleDay();
  const potw = potwPick();
  const otd = onThisDayRow();
  if (potw || otd) {
    const doneRaw = storageGet(STORE_DONE);
    const done = doneRaw && typeof doneRaw === "object" ? doneRaw : {};
    const pinCard = (row, cls, eyebrow) => {
      const pin = el("div", { class: cls });
      pin.append(el("div", { class: "pin-eyebrow", text: eyebrow }), catalogRow(row, done));
      root.append(pin);
    };
    if (potw) pinCard(potw, "pin pin-potw", "★ Puzzle of the Week");
    if (otd) pinCard(otd, "pin", "↺ On This Day · a year ago");
  }

  // Controls: one search box (date OR question substring) + Random. Built
  // ONCE per catalog build; typing patches ONLY the list container below, so
  // the input node is stable and never loses focus (plan KTD). SEARCH lives
  // in module scope and is restored here when re-entering the view.
  const controls = el("div", { class: "cat-controls" });
  const search = el("input", {
    type: "search", placeholder: "Search date or question…",
    autocomplete: "off", autocapitalize: "off", autocorrect: "off",
    spellcheck: "false", "aria-label": "Search puzzles",
  });
  search.value = SEARCH;
  const rand = el("button", { class: "btn", text: "🎲 Random" });
  rand.onclick = () => {
    // Uniform over eligible (non-today, R19) unplayed puzzles; if everything
    // is played, over all eligible (origin R3). Pool computed at click time.
    const all = eligibleRows();
    const unplayed = all.filter(r => !hasPlayed(r.n));
    const pool = unplayed.length ? unplayed : all;
    if (pool.length) startRound(pool[Math.floor(Math.random() * pool.length)].n);
  };
  controls.append(search, rand);
  root.append(controls);

  const list = el("div", { id: "catList" });
  root.append(list);

  // Windowed rendering is a PURE optimization: the filter always runs over
  // the full in-memory archive; the window only limits how many matched rows
  // are in the DOM at once ("Show more" appends the next chunk).
  const patchList = () => {
    // ET-day rollover while the page sits open: eligibleRows() would rememo
    // on its own, but the pins above are part of the one-time build — so
    // rebuild the whole catalog once and let pins (new day / new ISO week)
    // and the eligible list roll over together.
    if (PINS_DAY !== etPuzzleDay()) { updatePlay(); return; }
    list.textContent = "";
    const all = eligibleRows();
    // one storage read per repaint — catalogRow takes the done-map instead of
    // hitting localStorage per row (same object-shape guard as bestScore)
    const doneRaw = storageGet(STORE_DONE);
    const done = doneRaw && typeof doneRaw === "object" ? doneRaw : {};
    const q = SEARCH.trim();
    const ql = q.toLowerCase();
    const matched = q
      ? all.filter(r => r.d.includes(q) || r._ql.includes(ql))
      : all;
    if (!matched.length) {
      list.append(el("div", {
        class: "note",
        text: q ? "No puzzles match." : "No puzzles available yet.",
      }));
      return;
    }
    matched.slice(0, CATALOG_SHOW).forEach(r => list.append(catalogRow(r, done)));
    if (matched.length > CATALOG_SHOW) {
      const more = el("button", {
        class: "btn more", type: "button",
        text: `Show more (${matched.length - CATALOG_SHOW} left)`,
      });
      more.onclick = () => { CATALOG_SHOW += CATALOG_CHUNK; patchList(); };
      list.append(more);
    }
  };
  search.addEventListener("input", () => {
    SEARCH = search.value;
    CATALOG_SHOW = CATALOG_CHUNK; // new filter → back to the first window
    patchList();
  });
  patchList();

  // Group scores for catalog play live INSIDE this view — score tabs are
  // daily games only. Collapsed by default so the backlog stays the focus.
  if (DATA.catalog) {
    const scores = el("details");
    scores.append(el("summary", { text: "🏆 Group scores — shared rounds" }));
    renderCatalogBoard(scores);
    root.append(scores);
  }
}

// One catalog row: collapsed state shows ONLY "#N · date", the question, a
// binary played glyph, and Play/Replay — no answers, no per-player results,
// no numeric best score (scores can leak answers; plan KTD / origin R13).
function catalogRow(row, done) {
  const played = typeof done[String(row.n)] === "number";
  const card = el("div", { class: "card cat-row" });
  const main = el("div", { class: "cat-main" });
  const info = el("div", { class: "cat-info" });
  const meta = el("div", { class: "dim num" });
  meta.append(`#${row.n} · ${row.d}`);
  if (played) meta.append(el("span", { class: "played", text: " ✓" }));
  info.append(meta, el("div", { class: "cat-q", text: row.q }));
  const play = el("button", {
    class: "btn primary", type: "button",
    text: played ? "Replay" : "Play",
  });
  play.onclick = () => startRound(row.n);
  main.append(info, play);
  card.append(main);

  // Collapsed-answer-key component (plan KTD; AE5). Reveal is an explicit
  // tap; expanding adds n to REVEALED permanently (module state — survives
  // tab switches and re-renders). Folding it back up is visual only
  // (COLLAPSED), so re-expanding never re-gates. Answer text enters the DOM
  // lazily on first expand — collapsed rows carry no spoilers at all.
  const body = el("div", { class: "cat-key hidden" });
  const toggle = el("button", { class: "reveal", type: "button" });
  const isOpen = () => REVEALED.has(row.n) && !COLLAPSED.has(row.n);
  const paint = () => {
    const open = isOpen();
    if (open && !body.childNodes.length) fillAnswerKey(body, row);
    body.classList.toggle("hidden", !open);
    toggle.textContent = open ? "Hide answers ▴" : "Show answers ▾";
  };
  toggle.onclick = () => {
    if (isOpen()) COLLAPSED.add(row.n);
    else { REVEALED.add(row.n); COLLAPSED.delete(row.n); }
    paint();
  };
  paint();
  card.append(toggle, body);
  return card;
}

// Shared .slots grid: 10 ranked slots in the real game's 5×2 arrangement —
// ranks 1–5 down the left column, 6–10 down the right (grid-auto-flow:
// column). decorate(i) returns { cls, text, attrs? } for slot i.
function buildSlotsGrid(answers, decorate) {
  const grid = el("div", { class: "slots" });
  answers.forEach((_, i) => {
    const d = decorate(i);
    const s = el("div", { class: d.cls, ...d.attrs });
    s.append(
      el("span", { class: "rank", text: String(i + 1) }),
      el("span", { class: "ans", text: d.text }),
    );
    grid.append(s);
  });
  return grid;
}

// Revealed content: the 10 ranked answers, the group's daily results for
// this puzzle when the payload has them (DATA.results may be absent for a
// puzzle — omit silently), and the device-local best score (R18 marker).
function fillAnswerKey(body, row) {
  body.append(buildSlotsGrid(row.a, i => ({ cls: "slot", text: row.a[i] })));
  const best = bestScore(row.n);
  if (best !== null) {
    body.append(el("div", { class: "dim", text: `Your best on this device: ${best}/10` }));
  }
  const results = DATA.results && DATA.results[String(row.n)];
  if (Array.isArray(results) && results.length) {
    const res = el("div", { class: "cat-res" });
    res.append(el("div", { class: "dim", text: "That day in the group:" }));
    results.forEach(r => res.append(el("div", { class: "row", text: `${r.p} — ${r.v}/10` })));
    body.append(res);
  }
}

function buildRoundScreen(root) {
  const row = puzzleByNumber(ROUND.puzzle);
  if (!row) { clearRound(); ROUND = null; buildCatalog(root); return; }
  root.textContent = "";
  // Answer match forms live only in memory — answer-derived text is never
  // written to storage (R18); ROUND.guessed persists only the player's own
  // typed guesses in normalized form.
  const norms = row.a.map(normalizeGuess);

  const head = el("div", { class: "round-head" });
  const hgroup = el("div", {});
  hgroup.append(
    el("h2", { text: row.q }),
    el("div", { class: "dim num", text: metaLine(row) }),
  );
  // "Back" pauses, never abandons: the round is already persisted on every
  // mutation, so dropping module ROUND returns to the catalog where the
  // resume banner picks the round straight back up.
  const controls = el("div", { class: "round-controls" });
  const back = el("button", { class: "giveup", text: "⟵ Catalog" });
  back.onclick = () => {
    saveRound(ROUND);
    ROUND = null;
    PENDING_START = null;
    BANK_OPEN = false; BANK_SEARCH = "";
    updatePlay();
  };
  const giveup = el("button", { class: "giveup", text: "Give up" });
  wireGiveUp(giveup);
  controls.append(back, giveup);
  head.append(hgroup, controls);

  const slots = buildSlotsGrid(row.a, i => ({
    cls: "slot blank", text: "·····", attrs: { "data-slot": i },
  }));

  const hearts = el("div", { class: "hearts" });

  // Guess dictionary: row type → shared list key → [display, match] pairs.
  // row.ft (build-time lint failure / oversized dictionary) or a missing
  // dictionary means free-text-only: no dropdown chrome at all, just the dim
  // label. Free-text submit is ALWAYS active either way (R16) — a dictionary
  // gap can never make a slot unwinnable.
  const dictKey = !row.ft && row.t && DATA.dicts && DATA.dicts.types
    ? DATA.dicts.types[row.t] : undefined;
  const dict = (dictKey !== undefined && DATA.dicts.lists && DATA.dicts.lists[dictKey]) || null;

  const bar = el("div", { class: "guessbar" });
  if (!dict) {
    bar.append(el("div", { class: "dim nodict", text: "no autocomplete for this category — type your answer" }));
  }
  const guessrow = el("div", { class: "guessrow" });
  const sugg = el("div", { class: "suggest hidden" });
  const input = el("input", {
    type: "text", autocomplete: "off", autocapitalize: "off", autocorrect: "off",
    spellcheck: "false", enterkeyhint: "send", placeholder: "Your guess…",
    "aria-label": "Your guess",
  });
  const go = el("button", { class: "btn primary", type: "button", text: "Guess" });

  // -- answer bank (U8): hidden entirely for free-text puzzles (same `dict`
  // condition as the suggestion dropdown). Lists the category's FULL
  // dictionary alphabetically, minus found/guessed; a tap submits through
  // submit() below, keeps the sheet open, and repaints the list.
  let bankBtn = null, bankSheet = null, setBank = null;
  if (dict) {
    bankBtn = el("button", {
      id: "bankBtn", type: "button", text: "+",
      "aria-label": "Answer bank", "aria-expanded": "false",
    });
    // Anchored inside .guessrow like .suggest — no backdrop; outside taps are
    // handled by the document-level pointerdown listener up top.
    const sheet = el("div", { class: "bank-sheet hidden", role: "dialog", "aria-label": "Answer bank" });
    bankSheet = sheet;
    const bankHead = el("div", { class: "bank-head" });
    const bankSearch = el("input", {
      type: "search", placeholder: "Search the answer bank…",
      autocomplete: "off", autocapitalize: "off", autocorrect: "off",
      spellcheck: "false", "aria-label": "Search the answer bank",
    });
    const bankClose = el("button", {
      class: "bank-close", type: "button", text: "✕", "aria-label": "Close answer bank",
    });
    const bankList = el("div", { class: "bank-list" });
    bankHead.append(bankSearch, bankClose);
    sheet.append(bankHead, bankList);
    // full dictionary [display, match] pairs, alphabetical by display form —
    // sorted once per round screen, filtered per repaint
    const bankAll = dict.slice().sort((a, b) => a[0].localeCompare(b[0]));
    const paintBank = () => {
      bankList.textContent = "";
      const foundNorms = new Set(ROUND.slots.map(i => norms[i]));
      const guessed = new Set(ROUND.guessed);
      const q = normalizeGuess(BANK_SEARCH);
      const eligible = bankAll.filter(([, match]) =>
        !foundNorms.has(match) && !guessed.has(match) && (!q || match.includes(q)));
      // same prefix-first ranking as the input suggestions
      const matched = q
        ? eligible.filter(([, m]) => m.startsWith(q)).concat(eligible.filter(([, m]) => !m.startsWith(q)))
        : eligible;
      if (!matched.length) {
        bankList.append(el("div", { class: "note", text: "Nothing left here — found, tried, or filtered out." }));
        return;
      }
      matched.slice(0, BANK_SHOW).forEach(([display]) => {
        const b = el("button", { type: "button", text: display });
        // pointerdown + preventDefault: same iOS-keyboard-preserving pattern
        // as the suggestion dropdown
        b.onpointerdown = e => {
          e.preventDefault();
          submit(display);
          if (ROUND) paintBank(); // round may have just finished — root was rebuilt
        };
        bankList.append(b);
      });
      if (matched.length > BANK_SHOW) {
        const more = el("button", {
          class: "btn more", type: "button",
          text: `Show more (${matched.length - BANK_SHOW} left)`,
        });
        more.onclick = () => { BANK_SHOW += BANK_CHUNK; paintBank(); };
        bankList.append(more);
      }
    };
    setBank = open => {
      BANK_OPEN = open;
      bankBtn.setAttribute("aria-expanded", String(open));
      sheet.classList.toggle("hidden", !open);
      if (!open) return;
      BANK_SHOW = BANK_CHUNK;
      bankSearch.value = BANK_SEARCH;
      // never both lists at once — the bank supersedes the input's dropdown
      sugg.textContent = "";
      sugg.classList.add("hidden");
      paintBank();
    };
    bankBtn.onclick = () => setBank(!BANK_OPEN);
    bankClose.onclick = () => setBank(false);
    bankSearch.addEventListener("input", () => {
      BANK_SEARCH = bankSearch.value;
      BANK_SHOW = BANK_CHUNK; // new filter → back to the first window
      paintBank();
    });
  }

  if (dict) guessrow.append(sugg, bankSheet, bankBtn);
  guessrow.append(input, go);
  const feedback = el("div", { class: "feedback" });
  bar.append(guessrow, feedback);

  // -- targeted patchers: per-guess mutations touch only these nodes, so the
  // input element is never rebuilt and never loses focus (plan KTD).
  const drawHearts = () => {
    // full hearts stay --bad; lost hearts are the dim ♡ outline glyph
    hearts.textContent = "";
    hearts.append(
      el("span", { text: "♥".repeat(Math.max(0, ROUND.hearts)) }),
      el("span", { class: "lost", text: "♡".repeat(Math.max(0, 5 - ROUND.hearts)) }),
    );
  };
  const fillSlot = i => {
    const s = slots.querySelector(`[data-slot="${i}"]`);
    s.classList.remove("blank");
    s.classList.add("found", "pop"); // .pop: brief scale/glow keyframe (reduced-motion: none)
    s.querySelector(".ans").textContent = row.a[i];
  };
  const setFeedback = (msg, bad) => {
    feedback.textContent = msg;
    feedback.classList.toggle("bad", !!bad);
  };
  const drawSuggestions = () => {
    if (!dict) return;
    sugg.textContent = "";
    if (BANK_OPEN) { sugg.classList.add("hidden"); return; } // never both lists at once
    const norm = normalizeGuess(input.value);
    if (!norm.length) { sugg.classList.add("hidden"); return; } // suggest from the first character
    const foundNorms = new Set(ROUND.slots.map(i => norms[i]));
    // prefix matches outrank mid-word matches: typing "s" should surface
    // SKYFALL before CASINO ROYALE
    const starts = [];
    const contains = [];
    for (const [display, match] of dict) {
      if (starts.length >= 6) break;
      if (ROUND.guessed.includes(match) || foundNorms.has(match)) continue;
      if (match.startsWith(norm)) starts.push(display);
      else if (match.includes(norm) && contains.length < 6) contains.push(display);
    }
    const hits = starts.concat(contains).slice(0, 6);
    if (!hits.length) { sugg.classList.add("hidden"); return; }
    hits.forEach(display => {
      const b = el("button", { type: "button", text: display });
      // pointerdown + preventDefault fires before the input blurs, so the
      // iOS keyboard stays up and focus never leaves the input on a tap.
      b.onpointerdown = e => { e.preventDefault(); submit(display); };
      sugg.append(b);
    });
    sugg.classList.remove("hidden");
  };
  const disarmGiveup = () => {
    PENDING_START = null; // engaging with the round cancels a pending switch
    giveup.classList.remove("armed");
    giveup.textContent = "Give up";
  };

  const submit = text => {
    if (!ROUND) return;
    disarmGiveup();
    const norm = normalizeGuess(text);
    if (!norm) { setFeedback("Type a guess first.", false); input.focus(); return; }
    input.value = "";
    const idx = norms.indexOf(norm);
    if (ROUND.guessed.includes(norm) || (idx >= 0 && ROUND.slots.includes(idx))) {
      // Repeats never cost a heart: the same wrong guess again, or an answer
      // already on the board — gentle feedback only.
      setFeedback(idx >= 0 ? `Already found — that's #${idx + 1}.` : "Already tried that one — no heart lost.", false);
      drawSuggestions();
      input.focus();
      return;
    }
    ROUND.guessed.push(norm);
    if (idx >= 0) {
      ROUND.slots.push(idx);
      saveRound(ROUND);
      fillSlot(idx);
      setFeedback(`🏆 #${idx + 1}: ${row.a[idx]}`, false);
      if (ROUND.slots.length === row.a.length) { finishRound(root, row); return; }
    } else {
      ROUND.hearts -= 1;
      saveRound(ROUND);
      drawHearts();
      setFeedback("Not in the top 10 — lost a heart.", true);
      if (ROUND.hearts <= 0) { finishRound(root, row); return; }
    }
    drawSuggestions();
    input.focus();
  };

  input.addEventListener("input", drawSuggestions);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); submit(input.value); }
  });
  go.onclick = () => submit(input.value);

  // initial paint from ROUND — identical for a fresh start and a resume (R17)
  ROUND.slots.forEach(fillSlot);
  drawHearts();

  root.append(head, slots, hearts, bar);
  if (setBank && BANK_OPEN) setBank(true); // restore an open sheet across re-renders
  input.focus();
}

// Terminal state (flow F2): all 10 found or hearts exhausted. Records the
// best score (AE4 — a worse replay never lowers it), reveals the full key
// (finishing is the natural "revealed" state — plan KTD), clears the save,
// and offers the share.
function finishRound(root, row) {
  const found = ROUND.slots.slice();
  const score = found.length;
  recordScore(row.n, score);
  REVEALED.add(row.n);
  clearRound();
  ROUND = null;
  PENDING_START = null;
  BANK_OPEN = false; BANK_SEARCH = ""; // round over — the sheet dies with the round screen

  root.textContent = "";
  const card = el("div", { class: "card" });
  card.append(
    el("h2", { class: "num score", text: `🏆 ${score}/10` }),
    el("div", { class: "dim num", text: metaLine(row) }),
    el("div", { style: "margin:6px 0 2px", text: row.q }),
  );
  card.append(buildSlotsGrid(row.a, i => {
    const hit = found.includes(i);
    return { cls: hit ? "slot found" : "slot miss", text: (hit ? "🏆 " : "❌ ") + row.a[i] };
  }));

  const actions = el("div", { class: "resume-actions" });
  // Share (U6): text generation + the navigator.share → clipboard →
  // selectable-text fallback chain live in shareRound(). data-found carries
  // the found slot indices (comma-joined, 0-based) so the grid rebuilds from
  // the button itself after ROUND is gone; data-score is the count.
  const share = el("button", {
    id: "shareRound", class: "btn primary", text: "Share",
    "data-puzzle": String(row.n), "data-score": String(score),
    "data-found": found.join(","),
  });
  share.onclick = () => shareRound(share);
  const back = el("button", { class: "btn", text: "Back to catalog" });
  back.onclick = () => updatePlay();
  actions.append(share, back);
  card.append(actions);
  root.append(card);
}

// ---- share text (U6 — plan R15; origin R9/R10) -----------------------------
// The documented share-format contract (data/dailytens/README.md): header
// "Infinite Tens #N" + a 5×2 grid — row 1 = slots 1-5, row 2 = slots 6-10.
// Generated CLEAN by construction: bare code points (no VS16 — hence the
// escapes below, so no editor/tool can sneak a selector in), plain \n line
// breaks, no padding. The Python parser is hardened for transport mangling;
// this generator must never rely on that.
const CELL_WIN = "\u{1F3C6}"; // 🏆 bare
const CELL_MISS = "\u274C"; // ❌ bare

function shareText(puzzle, found) {
  let top = "", bottom = "";
  for (let i = 0; i < 10; i++) {
    const cell = found.has(i) ? CELL_WIN : CELL_MISS;
    if (i < 5) top += cell; else bottom += cell;
  }
  return `Infinite Tens #${puzzle}\n${top}\n${bottom}`;
}

// Fallback chain: navigator.share (iOS share sheet, the happy path straight
// into iMessage) → clipboard → a selectable text block under the button.
async function shareRound(btn) {
  // Re-entrancy guard: a second tap while the share sheet / clipboard promise
  // is pending would fire a second navigator.share and reject with a
  // confusing error — disable until the in-flight attempt settles.
  if (btn.disabled) return;
  btn.disabled = true;
  try {
    const found = new Set(
      btn.dataset.found.split(",").filter(s => s !== "").map(Number)
    );
    const text = shareText(btn.dataset.puzzle, found);
    if (navigator.share) {
      try {
        await navigator.share({ text });
        btn.textContent = "Share it in the chat 🏆";
        return;
      } catch (e) {
        if (e && e.name === "AbortError") return; // user closed the sheet — not a failure
        // NotAllowedError / anything else: fall through to the clipboard
      }
    }
    try {
      await navigator.clipboard.writeText(text);
      btn.textContent = "Copied!";
      return;
    } catch (e) {
      // no clipboard either (permissions, old browser) — last resort below
    }
    let block = $("#shareTextBlock");
    if (!block) {
      block = el("pre", { id: "shareTextBlock", class: "share-block" });
      (btn.closest(".card") || btn.parentNode).append(block);
    }
    block.textContent = text;
    btn.textContent = "Copy it from below";
  } finally {
    btn.disabled = false;
  }
}

// Stat heading with a plain-English explainer: title attr covers desktop
// hover; tapping the heading toggles the same line for touch (the group is
// on iPhones — hover alone would hide the explanations from everyone).
function statHeading(title, desc) {
  const h = el("h2", { class: "stat-h", title: desc });
  h.append(el("span", { text: title }), el("span", { class: "info num", text: " ⓘ" }));
  const note = el("div", { class: "note stat-desc hidden", text: desc });
  h.onclick = () => note.classList.toggle("hidden");
  return [h, note];
}

// ---- Today's Action landing card (dropdowns/portal plan U4) -----------------
// A live pulse pinned above the Overall board on Everyone + Overall — shown
// in ANY time window: it's today's race, not a filtered stat. Scores-only by
// construction (names + trophy counts, never question or answer text), so
// it's spoiler-safe pre-play. The puzzle number is an enhancement only when
// today's archive row happens to exist — top-up treats today as
// ABSENT-normal while the day is live, so the number-free nudge is the
// PRIMARY copy. Rebuilt on every render(), so ET-day rollover needs no memo.
function buildTodayCard() {
  const today = etPuzzleDay();
  const best = new Map(); // player -> best Daily Tens score today
  const pctBy = new Map(); // player -> that play's percentile (one play/day after dedup); undefined if none
  DATA.plays.forEach(p => {
    if (p.g !== "dailytens" || p.d !== today) return;
    const cur = best.get(p.p);
    if (cur == null || p.v > cur) { best.set(p.p, p.v); pctBy.set(p.p, p.pct); }
  });
  const pin = el("div", { class: "pin pin-today" });
  pin.append(el("div", { class: "pin-eyebrow", text: "⚡ Today's Daily Tens" }));
  const card = el("div", { class: "card" });
  if (!best.size) {
    const row = catalogAvailable() ? DATA.archive.find(r => r.d === today) : null;
    card.append(el("div", {
      class: "note",
      text: "Nobody's played today's puzzle yet — be first." + (row ? ` (#${row.n})` : ""),
    }));
  } else {
    const ranked = [...best].sort((a, b) => b[1] - a[1] || (a[0] < b[0] ? -1 : 1));
    const top = ranked[0][1];
    const leaders = ranked.filter(([, v]) => v === top).map(([p]) => p);
    // Default: all top-scorers share the crown. Eddie Mode breaks the tie to
    // the single highest percentile, but only when every leader posted one and
    // that top percentile isn't itself tied (R2a) — mirrors day_winners_eddie.
    let crowned = new Set(leaders);
    if (EDDIE_MODE && leaders.length > 1 && leaders.every(p => pctBy.get(p) != null)) {
      const topPct = Math.max(...leaders.map(p => pctBy.get(p)));
      const pctLeaders = leaders.filter(p => pctBy.get(p) === topPct);
      if (pctLeaders.length === 1) crowned = new Set(pctLeaders);
    }
    const res = el("div", { class: "cat-res" });
    ranked.forEach(([p, v]) => {
      const r = el("div", { class: "row" });
      r.append((crowned.has(p) ? "🏆 " : "") + p + " — ", el("span", { class: "num", text: v + "/10" }));
      res.append(r);
    });
    card.append(res);
    // who hasn't posted yet, from the full player universe, listed dim
    const waiting = [...new Set(DATA.plays.map(p => p.p))].sort().filter(p => !best.has(p));
    if (waiting.length) {
      card.append(el("div", { class: "dim", text: "Still to play: " + waiting.join(", ") }));
    }
  }
  pin.append(card);
  return pin;
}

// The win count to display for a leaderboard row: the Eddie tally when the
// lens is on (and the row carries one), else the shared-win count. table() and
// barChart() read row.wins directly, so callers remap wins -> winOf(r) on a
// copy before rendering — that drives the column value AND the click-to-sort.
function winOf(r) {
  return EDDIE_MODE && r.wins_eddie != null ? r.wins_eddie : r.wins;
}

function renderOverall(container) {
  const win = DATA.windows[WIN];
  // overall board — cross-game wins
  container.append(...statHeading("Overall",
    "A win = the group's best score in a game that day; ties share the win."
    + (EDDIE_MODE ? " Eddie Mode is on: Daily Tens ties go to the higher percentile." : "")));
  const overallCard = el("div", { class: "card" });
  if (win.overall.length) {
    // Eddie is win-ranked here, so re-sort the remapped rows to match the
    // server's off-state tiebreak order (wins desc, plays desc, name).
    const rows = win.overall
      .map(r => ({ ...r, wins: winOf(r) }))
      .sort((a, b) => b.wins - a.wins || b.plays - a.plays || (a.player < b.player ? -1 : 1));
    overallCard.append(table(
      [{ key: "player", label: "Player", link: selectPlayer },
       { key: "wins", label: EDDIE_MODE ? "Wins ⚡" : "Wins", desc: true }, { key: "plays", label: "Plays", desc: true }],
      rows.filter(r => !PLAYER || r.player === PLAYER), true));
    overallCard.append(barChart(rows.map(r => [r.player, r.wins])));
  } else {
    overallCard.append(el("div", { class: "note", text: "No scores in this window yet." }));
  }
  container.append(overallCard);

  // nerd stats — cross-game, so it lives on the Overall view
  const nerd = el("details");
  nerd.append(el("summary", { text: "🤓 Nerd Stats" }));
  const sections = [
    ["Form Rating", [{ key: "player", label: "Player" }, { key: "rating", label: "Rating", desc: true }], DATA.nerd.rating,
      "Hot-or-not meter: scores vs the group, with recent days counting more. 0 = group average, positive = on a heater."],
    ["Streaks", [{ key: "player", label: "Player" }, { key: "current", label: "Current", desc: true }, { key: "best", label: "Best", desc: true }], DATA.nerd.streaks,
      "Consecutive days played. Your current streak survives if you played today or yesterday."],
    ["Consistency", [{ key: "player", label: "Player" }, { key: "variance", label: "Variance" }], DATA.nerd.consistency,
      "How steady your scores are, day to day. Lower = more consistent."],
    ["Head-to-Head", [{ key: "a", label: "Winner" }, { key: "b", label: "Over" }, { key: "wins", label: "Days", desc: true }], DATA.nerd.h2h,
      "Days one player outscored another in the same game. Bragging rights, itemized."],
    ["Clutch", [{ key: "player", label: "Player" }, { key: "z", label: "Clutch z", desc: true }], DATA.nerd.clutch,
      "Performance on the days everyone struggled. Positive = shows up when the puzzle is brutal."],
  ];
  sections.forEach(([title, cols, rows, desc]) => {
    nerd.append(...statHeading(title, desc));
    const card = el("div", { class: "card" });
    const filtered = rows.filter(r => !PLAYER || r.player === PLAYER || r.a === PLAYER || r.b === PLAYER);
    card.append(filtered.length ? table(cols, filtered, false) : el("div", { class: "note", text: "Not enough data yet." }));
    nerd.append(card);
  });
  container.append(nerd);
}

// Every leaderboard name is a tap target that sets the Player dropdown —
// both entry points (tap a name / pick from the dropdown) converge on the
// merged player page (dropdowns/portal plan U2).
function selectPlayer(r) { PLAYER = r.player; render(); }

function renderGameBoard(container, game, meta) {
  const win = DATA.windows[WIN];
  const title = meta.label + (meta.lower_is_better ? " (lower is better)" : "");
  if (!meta.tracked) {
    container.append(el("h2", { text: title }));
    container.append(el("div", { class: "card" },
      el("div", { class: "note", text: "Not tracked yet — share format still being confirmed." })));
    return;
  }
  // Ranked by average with an eligibility bar (pipeline-side): players need
  // min(3, the window's most plays) plays to rank; the rest are listed after,
  // avg-sorted. The heading explainer names the rule — table() can't carry
  // per-column title attrs, so the %ile definition lives here too.
  let desc = "Ranked by average" +
    (meta.lower_is_better ? " (lower is better)" : "") +
    ". A player needs min(3, the window's most plays) plays to rank; everyone else is listed after.";
  if (game === "dailytens") desc += " %ile = avg of the percentiles players shared.";
  container.append(...statHeading(title, desc));
  const card = el("div", { class: "card" });
  const rows = (win.per_game[game] || []).filter(r => !PLAYER || r.player === PLAYER);
  if (!rows.length) {
    card.append(el("div", { class: "note", text: "No scores in this window." }));
  } else {
    // Avg leads the stat columns — it's the ranking stat now (wins/plays stay)
    const cols = [{
      key: "player", label: "Player", link: selectPlayer,
    }, { key: "avg", label: "Avg", desc: !meta.lower_is_better }];
    if (game === "dailytens") cols.push({ key: "pct", label: "%ile", desc: true }); // blank when a player never shared one
    // Only Daily Tens has percentiles, so only its Wins column reflects Eddie Mode.
    const winsLabel = EDDIE_MODE && game === "dailytens" ? "Wins ⚡" : "Wins";
    cols.push({ key: "wins", label: winsLabel, desc: true }, { key: "plays", label: "Plays", desc: true });
    // Average-ranked board — swap in the Eddie win value but keep the row order.
    const drows = rows.map(r => ({ ...r, wins: winOf(r) }));
    card.append(table(cols, drows, true));
    card.append(barChart(drows.map(r => [r.player, r.wins])));
  }
  container.append(card);
  // Category Mastery is Daily Tens-only (this function renders EVERY tracked
  // game's tab) and needs the archive/results keys (absent pre-backfill).
  if (game === "dailytens" && catalogAvailable()) container.append(buildCategoryMastery());
}

// ---- Category Mastery (category-stats plan U1 — R1/R2) ---------------------
// Who owns which Daily Tens categories. Built client-side per render by
// joining DATA.results (daily bests ONLY — catalog plays are structurally
// absent from results, so R2 holds by construction) to archive row types.
// Minimum-plays thresholds keep the stats honest: below them a category
// simply doesn't appear — nobody "owns pixarFilms" off one lucky game.
const MASTERY_MIN_PLAYER_PLAYS = 3; // per (player, category) to rank best/worst
const MASTERY_MIN_GROUP_PLAYS = 3; // total group plays to crown a category king
const KINGS_SHOWN = 15; // kings rows before "Show more"
let KINGS_ALL = false; // module scope: chip taps re-render — don't re-collapse

// Type keys are code-ish (us_states, pixarFilms) — prettify heuristically:
// split snake_case and camelCase, title-case words, uppercase known acronyms.
// Imperfect over ~92 keys by accepted trade-off (cosmetic, fixable per-key).
const CAT_ACRONYMS = new Set(["us", "un", "nba", "nfl", "nhl", "mlb", "tv", "fifa"]);
const categoryLabel = key =>
  String(key)
    .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
    .split(/[_\s]+/)
    .filter(Boolean)
    .map(w => {
      const lw = w.toLowerCase();
      return CAT_ACRONYMS.has(lw) ? lw.toUpperCase() : lw.charAt(0).toUpperCase() + lw.slice(1);
    })
    .join(" ");

function buildCategoryMastery() {
  // one aggregation pass per render: archive n→t, then walk DATA.results
  const typeByN = new Map();
  DATA.archive.forEach(r => { if (r.t) typeByN.set(r.n, r.t); });
  const perPlayer = new Map(); // player -> Map(category -> { plays, sum })
  Object.entries(DATA.results || {}).forEach(([n, rows]) => {
    const cat = typeByN.get(Number(n));
    if (!cat || !Array.isArray(rows)) return;
    rows.forEach(r => {
      let cats = perPlayer.get(r.p);
      if (!cats) { cats = new Map(); perPlayer.set(r.p, cats); }
      const s = cats.get(cat) || { plays: 0, sum: 0 };
      s.plays += 1;
      s.sum += r.v;
      cats.set(cat, s);
    });
  });

  const det = el("details");
  det.append(el("summary", { text: "📊 Category Mastery" }));

  // "US States 8.2/10" cell/fragment — number gets the mono .num treatment
  const catScore = (cat, s) => [
    categoryLabel(cat) + " ",
    el("span", { class: "num", text: (s.sum / s.plays).toFixed(1) + "/10" }),
  ];

  // -- block 1: best & worst category per player (≥3 plays to qualify)
  det.append(...statHeading("Best & Worst Categories",
    "Each player's strongest and weakest category by average score, all-time. " +
    "Only categories that player has faced at least 3 times count."));
  const bwCard = el("div", { class: "card" });
  const players = [...perPlayer.keys()].sort().filter(p => !PLAYER || p === PLAYER);
  if (!players.length) {
    bwCard.append(el("div", { class: "note", text: "Not enough data yet." }));
  } else {
    const t = el("table");
    const head = el("tr");
    ["Player", "Best", "Worst"].forEach(label => head.append(el("th", { text: label })));
    t.append(head);
    players.forEach(p => {
      // qualifying categories, best avg first (ties: more plays, then label)
      const qual = [...perPlayer.get(p)]
        .filter(([, s]) => s.plays >= MASTERY_MIN_PLAYER_PLAYS)
        .sort((a, b) =>
          b[1].sum / b[1].plays - a[1].sum / a[1].plays ||
          b[1].plays - a[1].plays ||
          (a[0] < b[0] ? -1 : 1));
      const tr = el("tr");
      tr.append(el("td", { text: p }));
      if (!qual.length) {
        tr.append(el("td", { class: "dim", colspan: "2", text: "needs 3 plays in one category" }));
      } else {
        const best = el("td");
        best.append(...catScore(...qual[0]));
        tr.append(best);
        // a single qualifying category is a best, not also a worst
        if (qual.length === 1) {
          tr.append(el("td", { class: "dim", text: "—" }));
        } else {
          const worst = el("td");
          worst.append(...catScore(...qual[qual.length - 1]));
          tr.append(worst);
        }
      }
      t.append(tr);
    });
    bwCard.append(t);
  }
  det.append(bwCard);

  // -- block 2: category kings (≥3 total group plays per category)
  det.append(...statHeading("Category Kings",
    "The reigning champ of every category the group has played at least 3 times " +
    "— highest average score takes the crown."));
  const kCard = el("div", { class: "card" });
  const catTotals = new Map(); // category -> { plays, top: { p, avg, plays } }
  perPlayer.forEach((cats, p) => {
    cats.forEach((s, cat) => {
      const tot = catTotals.get(cat) || { plays: 0, top: null };
      tot.plays += s.plays;
      const avg = s.sum / s.plays;
      // name tie-break keeps the crown independent of Map iteration order
      const takes = !tot.top || avg > tot.top.avg ||
        (avg === tot.top.avg && (s.plays > tot.top.plays ||
          (s.plays === tot.top.plays && p < tot.top.p)));
      if (takes) tot.top = { p, avg, plays: s.plays };
      catTotals.set(cat, tot);
    });
  });
  const kings = [...catTotals]
    .filter(([, tot]) => tot.plays >= MASTERY_MIN_GROUP_PLAYS)
    .map(([cat, tot]) => ({ label: categoryLabel(cat), top: tot.top }))
    .sort((a, b) => (a.label < b.label ? -1 : a.label > b.label ? 1 : 0));
  if (!kings.length) {
    kCard.append(el("div", { class: "note", text: "Not enough data yet." }));
  } else {
    // PLAYER chip highlights the selected player's crowns instead of
    // filtering — an emptied kings list would read as "no data".
    const res = el("div", { class: "cat-res" });
    const paintKings = () => {
      res.textContent = "";
      (KINGS_ALL ? kings : kings.slice(0, KINGS_SHOWN)).forEach(k => {
        const row = el("div", { class: "row" });
        row.append(
          k.label + " — ",
          el("span", { class: k.top.p === PLAYER ? "played" : "", text: k.top.p }),
          " ",
          el("span", { class: "num", text: k.top.avg.toFixed(1) + "/10" }),
        );
        res.append(row);
      });
      if (!KINGS_ALL && kings.length > KINGS_SHOWN) {
        const more = el("button", {
          class: "btn more", type: "button",
          text: `Show more (${kings.length - KINGS_SHOWN} left)`,
        });
        more.onclick = () => { KINGS_ALL = true; paintKings(); };
        res.append(more);
      }
    };
    paintKings();
    kCard.append(res);
  }
  det.append(kCard);

  // -- block 3: the thresholds, named
  det.append(el("div", {
    class: "dim", text: "min 3 plays per player · 3 group plays per category",
  }));
  return det;
}

// ---- Merged player page (profiles plan U2-U4; dropdowns/portal plan U2) ----
// "Way too in-depth" Daily Tens stats for one player, shown when the Player
// dropdown (or any leaderboard name tap) selects them. Everything derives
// client-side from the detailed plays rows {d,g,p,v,n,pct} plus the archive;
// player pages are public to the whole group and never render answer-key
// text (R6).

// One expensive pass per profile open, memoized on (player, DATA): every
// deep-stats block and fact generator reads this context, never raw payload.
// The context deliberately carries NO answer-key text — categories and
// questions only — so nothing downstream can leak a spoiler (R6).
let PROFILE_CTX = { player: null, data: null, ctx: null };
function buildPlayerContext(player) {
  if (PROFILE_CTX.player === player && PROFILE_CTX.data === DATA) return PROFILE_CTX.ctx;
  const log = DATA.plays
    .filter(p => p.g === "dailytens" && p.p === player)
    .map(p => {
      const arch = p.n != null ? puzzleByNumber(p.n) : null;
      return {
        d: p.d, n: p.n != null ? p.n : null, v: p.v,
        pct: p.pct != null ? p.pct : null,
        t: (arch && arch.t) || null, q: (arch && arch.q) || null,
      };
    })
    .sort((a, b) => (a.d < b.d ? 1 : a.d > b.d ? -1 : (b.n || 0) - (a.n || 0)));

  const hist = Array.from({ length: 11 }, () => 0);
  log.forEach(r => { if (r.v >= 0 && r.v <= 10) hist[Math.round(r.v)] += 1; });

  // Play streaks over unique ET days. Current streak survives if the last
