  // play was today or yesterday (same rule the nerd streaks use).
  const DAY = 86400000;
  const days = [...new Set(log.map(r => r.d))].sort();
  let longest = 0, run = 0, prevT = null;
  days.forEach(d => {
    const t = Date.parse(d + "T00:00:00Z");
    run = prevT != null && t - prevT === DAY ? run + 1 : 1;
    if (run > longest) longest = run;
    prevT = t;
  });
  let current = 0, expect = null;
  const todayT = Date.parse(etPuzzleDay() + "T00:00:00Z");
  for (let i = days.length - 1; i >= 0; i--) {
    const t = Date.parse(days[i] + "T00:00:00Z");
    if (expect === null) {
      if (todayT - t > DAY) break; // last play older than yesterday: streak dead
      current = 1; expect = t - DAY;
    } else if (t === expect) { current += 1; expect = t - DAY; }
    else break;
  }

  const perfect = log.filter(r => r.v === 10);
  const cats = new Map(); // type key -> { plays, sum } (daily plays only)
  log.forEach(r => {
    if (!r.t) return;
    const s = cats.get(r.t) || { plays: 0, sum: 0 };
    s.plays += 1; s.sum += r.v;
    cats.set(r.t, s);
  });

  const shared = log.filter(r => r.pct != null);
  const pctStats = shared.length ? {
    avg: shared.reduce((a, r) => a + r.pct, 0) / shared.length,
    best: Math.max(...shared.map(r => r.pct)),
    count: shared.length,
    rate: shared.length / log.length,
  } : null;

  // Daily-Tens-only head-to-head by per-day best (nerd.h2h mixes all games,
  // so the profile computes its own — plan KTD).
  const bestByDay = new Map(); // player -> Map(day -> best trophies)
  DATA.plays.forEach(p => {
    if (p.g !== "dailytens") return;
    let m = bestByDay.get(p.p);
    if (!m) { m = new Map(); bestByDay.set(p.p, m); }
    const cur = m.get(p.d);
    if (cur == null || p.v > cur) m.set(p.d, p.v);
  });
  const mine = bestByDay.get(player) || new Map();
  const h2h = [];
  bestByDay.forEach((theirs, other) => {
    if (other === player) return;
    let w = 0, l = 0, t = 0;
    mine.forEach((v, d) => {
      if (!theirs.has(d)) return;
      const ov = theirs.get(d);
      if (v > ov) w += 1; else if (v < ov) l += 1; else t += 1;
    });
    if (w + l + t) h2h.push({ other, w, l, t });
  });
  h2h.sort((a, b) => (a.other < b.other ? -1 : 1));

  const nerdRow = key => (DATA.nerd[key] || []).find(r => r.player === player) || null;
  const ctx = {
    player, log, hist, days, current, longest, perfect, cats, pctStats, h2h,
    bestByDay, // player -> Map(day -> best trophies): group context for facts
    consistency: nerdRow("consistency"), clutch: nerdRow("clutch"),
  };
  PROFILE_CTX = { player, data: DATA, ctx };
  return ctx;
}

// ---- Fun facts engine (profiles plan U4) -----------------------------------
// Deterministic generators over the player context: each returns a fact
// string or null below its own data threshold. Selection rotates by ET day
// via the same djb2 hash the PotW uses — every device shows the same facts
// on the same day. Voice: playful trash-talk, always concrete, never answers.

const ord = n => {
  const r = Math.round(n), m10 = r % 10, m100 = r % 100;
  const suf = m100 >= 11 && m100 <= 13 ? "th" : m10 === 1 ? "st" : m10 === 2 ? "nd" : m10 === 3 ? "rd" : "th";
  return r + suf;
};
const avgOf = log => log.reduce((a, r) => a + r.v, 0) / log.length;
const an = n => (n === 8 || n === 11 || n === 18 ? "an" : "a"); // article for scores/streak counts

const FACT_GENERATORS = [
  { id: "pct-nuance", weight: 90, rare: true, gen: ctx => {
    const p = ctx.pctStats;
    if (!p || p.count < 2 || p.avg < 75) return null;
    if (ctx.log.some(r => r.pct != null && r.v === 10)) return null;
    const bestRow = ctx.log.filter(r => r.pct != null).sort((a, b) => b.pct - a.pct)[0];
    return `${ctx.player}'s ${p.avg.toFixed(1)} average percentile comes from just ` +
      `${p.count} shared games — and not one of them was a 10/10. The ` +
      `${ord(bestRow.pct)}-percentile day was ${an(bestRow.v)} ${bestRow.v}/10: that puzzle ` +
      `massacred the whole site.`;
  } },
  { id: "perfect-collection", weight: 80, rare: true, gen: ctx => {
    if (!ctx.perfect.length) return null;
    const tags = ctx.perfect.map(r => (r.n != null ? "#" + r.n : r.d));
    return ctx.perfect.length >= 3
      ? `${ctx.player} has a trophy case: ${ctx.perfect.length} perfect rounds ` +
        `and counting, most recently ${tags[0]}.`
      : `${ctx.player} has bagged ${ctx.perfect.length === 1 ? "a" : ctx.perfect.length} ` +
        `perfect 10/10${ctx.perfect.length > 1 ? "s" : ""} — ${tags.join(" and ")}. Frame it.`;
  } },
  { id: "brutal-day", weight: 75, gen: ctx => {
    // the group's worst day (3+ players) where this player still led it
    let pick = null;
    const byDay = new Map(); // day -> [[player, v]]
    ctx.bestByDay.forEach((m, pl) => m.forEach((v, d) => {
      (byDay.get(d) || byDay.set(d, []).get(d)).push([pl, v]);
    }));
    byDay.forEach((entries, d) => {
      if (entries.length < 3) return;
      const avg = entries.reduce((a, e) => a + e[1], 0) / entries.length;
      const top = Math.max(...entries.map(e => e[1]));
      const mineV = ctx.bestByDay.get(ctx.player) && ctx.bestByDay.get(ctx.player).get(d);
      if (mineV == null || mineV < top || avg > 6.5) return;
      if (!pick || avg < pick.avg) pick = { d, avg, v: mineV };
    });
    if (!pick) return null;
    return `${pick.d} broke everybody — the group averaged ${pick.avg.toFixed(1)}/10 ` +
      `— and ${ctx.player} still walked away with the day at ${pick.v}/10.`;
  } },
  { id: "unluckiest-day", weight: 68, gen: ctx => {
    const r = ctx.log.filter(x => x.pct != null && x.pct >= 70 && x.v <= 6)
      .sort((a, b) => b.pct - a.pct)[0];
    if (!r) return null;
    return `${ctx.player} scored just ${r.v}/10 on ${r.n != null ? "#" + r.n : r.d} ` +
      `and STILL landed in the ${ord(r.pct)} percentile. Imagine how everyone else did.`;
  } },
  { id: "category-king", weight: 70, gen: ctx => {
    const best = [...ctx.cats]
      .filter(([, s]) => s.plays >= 3 && s.sum / s.plays >= 8)
      .sort((a, b) => b[1].sum / b[1].plays - a[1].sum / a[1].plays)[0];
    if (!best) return null;
    const [cat, s] = best;
    return `When the category is ${categoryLabel(cat)}, ${ctx.player} turns into a ` +
      `machine: ${(s.sum / s.plays).toFixed(1)}/10 across ${s.plays} games.`;
  } },
  { id: "streak-lore", weight: 60, gen: ctx => {
    if (ctx.longest < 4) return null;
    return ctx.current === ctx.longest && ctx.current >= 4
      ? `${ctx.player} is riding ${an(ctx.current)} ${ctx.current}-day streak right now — a personal best. Do not jinx it.`
      : `${ctx.player} once played ${ctx.longest} days straight. ` +
        (ctx.current ? `Current run: ${ctx.current}.` : `The streak fell, but legends don't.`);
  } },
  { id: "nemesis", weight: 65, gen: ctx => {
    const worst = ctx.h2h.filter(r => r.l - r.w >= 3).sort((a, b) => (b.l - b.w) - (a.l - a.w))[0];
    if (!worst) return null;
    return `${worst.other} owns ${ctx.player} head-to-head: ${worst.l} days to ` +
      `${worst.w}. Nemesis confirmed.`;
  } },
  { id: "share-rate-tease", weight: 55, gen: ctx => {
    const p = ctx.pctStats;
    if (!p || ctx.log.length < 5 || p.rate > 0.5 || p.avg < 70) return null;
    return `${ctx.player} only shares a percentile ${Math.round(p.rate * 100)}% of the ` +
      `time — and those average ${p.avg.toFixed(1)}. Only shares the good ones. Noted.`;
  } },
  { id: "grinder", weight: 30, gen: ctx => {
    if (ctx.log.length < 3) return null;
    return `${ctx.player} has logged ${ctx.log.length} games at a ` +
      `${avgOf(ctx.log).toFixed(1)}/10 average. The grind is real.`;
  } },
];

function buildFunFacts(ctx) {
  const wrap = el("div", { class: "facts" });
  const qualifying = FACT_GENERATORS
    .map(g => { const text = g.gen(ctx); return text && { ...g, text }; })
    .filter(Boolean);
  if (!qualifying.length) {
    wrap.append(el("div", { class: "fact", text: "Play more Daily Tens — the fun facts write themselves." }));
    return wrap;
  }
  // One fact at a time, cycling daily: day-number arithmetic (not a hash of
  // the day) guarantees tomorrow's fact is a DIFFERENT one until the pool
  // wraps, and every qualifying fact gets its day — a weight-ranked single
  // slot would show the same blockbuster forever. The per-player hash offset
  // desyncs players so profiles don't all rotate in lockstep. Same fact for
  // the whole group all day (ET), by design.
  const dayNum = Math.floor(Date.parse(etPuzzleDay() + "T00:00:00Z") / 86400000);
  const f = qualifying[(dayNum + weekHash(ctx.player)) % qualifying.length];
  wrap.append(
    el("div", { class: "dim", text: "🎲 Fun fact of the day" }),
    el("div", { class: "fact" + (f.rare ? " rare" : ""), text: f.text }),
  );
  return wrap;
}

// All-time Daily Tens headline strip from the shipped leaderboard row
// (plays/avg/wins) — "—" placeholders when the player has none logged.
function buildSummaryStrip(player) {
  const row = (DATA.windows.all.per_game.dailytens || []).find(r => r.player === player);
  const strip = el("div", { class: "profile-strip" });
  const stat = (label, v) => {
    const s = el("span");
    s.append(el("b", { class: "num", text: v ?? "—" }), " " + label);
    return s;
  };
  strip.append(
    stat("plays", row && row.plays),
    stat("avg", row && row.avg),
    stat(EDDIE_MODE ? "wins ⚡" : "wins", row && winOf(row)),
  );
  if (row && row.pct != null) strip.append(stat("avg %ile shared", row.pct));
  return strip;
}

// The deep Daily Tens blocks of the merged player page (dropdowns/portal
// plan U2) — rendered under the filtered board only when GAME is Daily Tens.
// The fun-fact card and summary strip render ABOVE this in renderStats, so
// a player with zero games still gets their card before this bails.
function buildPlayerBlocks(container, ctx) {
  const player = ctx.player;
  if (!ctx.log.length) {
    container.append(el("div", { class: "note", text: "No Daily Tens games logged yet." }));
    return;
  }

  // -- Game Log --------------------------------------------------------------
  const logHead = statHeading("Game Log",
    "Every Daily Tens game " + player + " shared, newest first. %ile appears " +
    "when it was shared; category needs the puzzle archive.");
  const logRows = ctx.log.map(r => ({
    date: r.d,
    puzzle: r.n != null ? "#" + r.n : "",
    score: r.v,
    pct: r.pct != null ? r.pct : "",
    category: r.t ? categoryLabel(r.t) : "",
  }));
  const logCols = [
    { key: "date", label: "Date" }, { key: "puzzle", label: "Puzzle" },
    { key: "score", label: "Score", desc: true }, { key: "pct", label: "%ile", desc: true },
  ];
  if (catalogAvailable()) logCols.push({ key: "category", label: "Category" });
  const logCard = el("div", { class: "card" }, table(logCols, logRows, false));
  if (ctx.log.length > 15) {
    // long logs fold behind a details toggle so the profile stays scannable
    const det = el("details");
    det.append(el("summary", { text: `Full log (${ctx.log.length} games)` }), logCard);
    container.append(...logHead, det);
  } else {
    container.append(...logHead, logCard);
  }

  // -- Score Histogram ---------------------------------------------------------
  container.append(...statHeading("Score Histogram",
    "How many games ended at each trophy count, 10 down to 0."));
  const histPairs = [];
  for (let s = 10; s >= 0; s--) histPairs.push([s + "/10", ctx.hist[s]]);
  container.append(el("div", { class: "card" },
    barChart(histPairs.filter(([, c], i) => c > 0 || i === 0))));

  // -- Streaks & Perfect Rounds -----------------------------------------------
  container.append(...statHeading("Streaks & Perfect Rounds",
    "Consecutive days played (current survives if the last game was today or " +
    "yesterday), plus every 10/10."));
  const spCard = el("div", { class: "card" });
  const line = (label, frag) => {
    const d = el("div", { class: "row" });
    d.append(label + ": ");
    d.append(frag);
    return d;
  };
  spCard.append(
    line("Current streak", el("b", { class: "num", text: ctx.current + (ctx.current === 1 ? " day" : " days") })),
    line("Longest streak", el("b", { class: "num", text: ctx.longest + (ctx.longest === 1 ? " day" : " days") })),
  );
  if (ctx.perfect.length) {
    const list = ctx.perfect.map(r => (r.n != null ? "#" + r.n : r.d)).join(", ");
    spCard.append(line("Perfect rounds", el("b", { class: "num", text: ctx.perfect.length + " — " + list })));
  } else {
    spCard.append(el("div", { class: "note", text: "No 10/10 yet — the collection awaits." }));
  }
  container.append(spCard);

  // -- Category Strengths (archive-gated, like Category Mastery) ---------------
  if (catalogAvailable()) {
    container.append(...statHeading("Category Strengths",
      "Best and toughest categories by average score — needs 2+ games in a category."));
    const csCard = el("div", { class: "card" });
    const qual = [...ctx.cats]
      .filter(([, s]) => s.plays >= 2)
      .sort((a, b) => b[1].sum / b[1].plays - a[1].sum / a[1].plays || b[1].plays - a[1].plays);
    if (!qual.length) {
      csCard.append(el("div", { class: "note", text: "Needs 2 games in one category to show up here." }));
    } else {
      const catLine = ([cat, s]) => {
        const d = el("div", { class: "row" });
        d.append(categoryLabel(cat) + " ",
          el("span", { class: "num", text: (s.sum / s.plays).toFixed(1) + "/10" }),
          el("span", { class: "dim", text: " · " + s.plays + " games" }));
        return d;
      };
      csCard.append(el("div", { class: "dim", text: "Strongest" }));
      qual.slice(0, 3).forEach(q => csCard.append(catLine(q)));
      if (qual.length > 3) {
        csCard.append(el("div", { class: "dim", text: "Toughest" }));
        qual.slice(-Math.min(3, qual.length - 3)).reverse().forEach(q => csCard.append(catLine(q)));
      }
    }
    container.append(csCard);
  }

  // -- Percentiles --------------------------------------------------------------
  container.append(...statHeading("Percentiles",
    "The site-wide percentile from shared end screens. Share-rate = how often " +
    "a game came with one — nobody's forced to share."));
  const pcCard = el("div", { class: "card" });
  if (ctx.pctStats) {
    const p = ctx.pctStats;
    pcCard.append(
      line("Average", el("b", { class: "num", text: p.avg.toFixed(1) })),
      line("Best", el("b", { class: "num", text: p.best.toFixed(2) })),
      line("Shared", el("b", { class: "num", text: p.count + " of " + ctx.log.length + " games (" + Math.round(p.rate * 100) + "%)" })),
    );
  } else {
    pcCard.append(el("div", { class: "note", text: "No percentiles shared yet." }));
  }
  container.append(pcCard);

  // -- Head-to-Head ---------------------------------------------------------------
  container.append(...statHeading("Head-to-Head",
    "Daily Tens only: days both players played, best score per day wins."));
  const hhCard = el("div", { class: "card" });
  if (ctx.h2h.length) {
    hhCard.append(table([
      { key: "other", label: "vs" }, { key: "w", label: "W", desc: true },
      { key: "l", label: "L" }, { key: "t", label: "T" },
    ], ctx.h2h, false));
  } else {
    hhCard.append(el("div", { class: "note", text: "No shared game days yet." }));
  }
  container.append(hhCard);

  // -- Nerd Corner (all-games scalars from the shipped nerd stats) ----------------
  if (ctx.consistency || ctx.clutch) {
    container.append(...statHeading("Nerd Corner (all games)",
      "Consistency variance and clutch z-score from the Overall nerd stats — " +
      "computed across every tracked game, not Daily Tens alone."));
    const nCard = el("div", { class: "card" });
    if (ctx.consistency) nCard.append(line("Consistency variance", el("b", { class: "num", text: ctx.consistency.variance })));
    if (ctx.clutch) nCard.append(line("Clutch z", el("b", { class: "num", text: ctx.clutch.z })));
    container.append(nCard);
  }
}

// Catalog leaderboard (U6 — plan R15; origin R9/R10). Best-effort by design:
// it reflects what was SHARED in the chat, all-time only. Rows arrive as
// best-per-(player, puzzle) aggregates {p, n, v} (idempotent pipeline-side);
// everything displayed here derives client-side from those rows.
function renderCatalogBoard(container) {
  // Embedded in the Infinite Tens view (no tab, no PLAYER chips): always the
  // whole group — a four-person board needs no filtering.
  const boards = DATA.catalog.boards || [];
  const summary = el("div", { class: "card" });
  if (!boards.length) {
    // sparse-friendly copy (plan KTD): sharing is optional, never nagged
    summary.append(el("div", {
      class: "note", text: "Scores appear when someone shares a round in the chat.",
    }));
    container.append(summary);
    return;
  }

  // per-player summary: puzzles played, total trophies, perfect rounds
  const per = new Map();
  boards.forEach(r => {
    const s = per.get(r.p) || { player: r.p, puzzles: 0, trophies: 0, perfect: 0 };
    s.puzzles += 1;
    s.trophies += r.v;
    if (r.v >= 10) s.perfect += 1;
    per.set(r.p, s);
  });
  const rows = [...per.values()].sort((a, b) =>
    b.trophies - a.trophies || b.puzzles - a.puzzles || (a.player < b.player ? -1 : 1));
  summary.append(table(
    [{ key: "player", label: "Player" }, { key: "puzzles", label: "Puzzles", desc: true },
     { key: "trophies", label: "Trophies", desc: true }, { key: "perfect", label: "Perfect", desc: true }],
    rows, true));
  container.append(summary);

  // per-puzzle bests, newest puzzle first — joined to the archive for the
  // question when it exists, "puzzle unavailable" placeholder otherwise
  // (mirrors the foundation plan's missing-archive posture).
  container.append(el("h2", { text: "Shared rounds" }));
  const list = el("div", { class: "card" });
  const byPuzzle = new Map();
  boards.forEach(r => {
    if (!byPuzzle.has(r.n)) byPuzzle.set(r.n, []);
    byPuzzle.get(r.n).push(r);
  });
  const potw = potwPick(); // current Puzzle of the Week gets a small gold ★
  [...byPuzzle.keys()].sort((a, b) => b - a).forEach(n => {
    const archived = puzzleByNumber(n);
    const block = el("div", { class: "cat-res" });
    const head = el("div", { class: "dim" });
    if (potw && potw.n === n) head.append(el("span", { class: "score", text: "★ " }));
    head.append(`#${n} — ${archived ? archived.q : "puzzle unavailable"}`);
    block.append(head);
    byPuzzle.get(n)
      .sort((a, b) => b.v - a.v || (a.p < b.p ? -1 : 1))
      .forEach(r => block.append(el("div", { class: "row", text: `${r.p} — ${r.v}/10` })));
    list.append(block);
  });
  container.append(list);
}

// Settings gear + popover (post-unlock header, right of the wordmark).
// Selecting a theme applies instantly — dataset.theme + the theme-color meta
// — and persists; the tokens cascade, so no full render is needed. Open
// state is module scope (SETTINGS_OPEN) so re-renders restore an open
// popover; outside taps close it via the document listener up top.
function buildSettings() {
  const wrap = el("div", { class: "settings" });
  const gear = el("button", {
    class: "gear", type: "button", text: "⚙",
    "aria-label": "Settings", "aria-expanded": String(SETTINGS_OPEN),
  });
  const pop = el("div", { class: "card settings-pop" + (SETTINGS_OPEN ? "" : " hidden") });
  pop.append(el("div", { class: "dim", text: "Theme" }));
  const seg = el("div", { class: "seg" });
  [["dark", "Dark"], ["light", "Light"]].forEach(([key, label]) => {
    const b = el("button", { type: "button", text: label });
    b.onclick = () => {
      applyTheme(key);
      storageSet(STORE_THEME, key);
      SETTINGS_OPEN = false; // picked — close, no render needed
      pop.classList.add("hidden");
      gear.setAttribute("aria-expanded", "false");
      paintSeg();
    };
    seg.append(b);
  });
  const paintSeg = () => {
    const theme = currentTheme();
    [...seg.children].forEach((b, i) =>
      b.classList.toggle("on", (i === 1) === (theme === "light")));
  };
  paintSeg();
  pop.append(seg);

  // Eddie Mode: per-viewer lens that breaks Daily Tens win ties by percentile.
  // Unlike Theme, it changes board data, so it re-renders via render().
  pop.append(el("div", { class: "dim", text: "Eddie Mode" }));
  const eseg = el("div", { class: "seg" });
  [[false, "Off"], [true, "On"]].forEach(([val, label]) => {
    const b = el("button", { type: "button", text: label });
    b.onclick = () => {
      EDDIE_MODE = val;
      storageSet(STORE_EDDIE, val);
      render(); // rebuilds #app; module-scope view state persists across it
    };
    eseg.append(b);
  });
  [...eseg.children].forEach((b, i) => b.classList.toggle("on", (i === 1) === EDDIE_MODE));
  pop.append(eseg);

  gear.onclick = () => {
    SETTINGS_OPEN = !SETTINGS_OPEN;
    pop.classList.toggle("hidden", !SETTINGS_OPEN);
    gear.setAttribute("aria-expanded", String(SETTINGS_OPEN));
  };
  wrap.append(gear, pop);
  return wrap;
}

// ---- dropdown control row (dropdowns/portal plan U1) ------------------------
// Three native selects wearing one designed skin: Game / Player / Time. The
// native control opens the platform picker (the iOS wheel — zero a11y work,
// zero outside-tap code); the .dd wrapper owns the visual identity. Every
// change is a full stats re-render.
function buildControls() {
  const row = el("div", { class: "ddrow" });
  const dd = (id, label, options, current, onChange) => {
    const wrap = el("div", { class: "dd" });
    const select = el("select", { id, "aria-label": label });
    options.forEach(([value, text]) => {
      const o = el("option", { value, text });
      if (value === current) o.selected = true;
      select.append(o);
    });
    select.onchange = () => onChange(select.value);
    wrap.append(el("label", { for: id, text: label }), select);
    return wrap;
  };
  // Game options: Overall first (the scores are the front door), then
  // tracked games in DATA.games order. Untracked games (Wiki Race) and the
  // catalog get no option — catalog play lives behind the ∞ portal.
  const games = [["overall", "Overall"]];
  Object.entries(DATA.games).forEach(([g, meta]) => {
    if (meta.tracked) games.push([g, meta.label]);
  });
  const players = [...new Set(DATA.plays.map(p => p.p))].sort();
  if (PLAYER && !players.includes(PLAYER)) PLAYER = null; // payload swap dropped them
  row.append(
    dd("ddGame", "Game", games, GAME, v => { GAME = v; render(); }),
    dd("ddPlayer", "Player", [["", "Everyone"], ...players.map(p => [p, p])], PLAYER || "",
      v => { PLAYER = v || null; render(); }),
    dd("ddTime", "Time",
      [["today", "Today"], ["week", "Week"], ["month", "Month"], ["all", "All-time"]], WIN,
      v => { WIN = v; render(); }),
  );
  return row;
}

// Stats area body: the Overall or per-game board for the current selections.
// A selected player makes this the merged player page (dropdowns/portal plan
// U2) — a render-order rule, not a screen: fun fact FIRST (before any
// bail-out, so a player with zero Daily Tens games still gets their card),
// then the all-time summary strip, then the boards filtered by the existing
// PLAYER logic, then the deep Daily Tens blocks when that's the game shown.
function renderStats(container) {
  // stale-state guard: a payload swap can drop a game key
  if (GAME !== "overall" && !(DATA.games[GAME] && DATA.games[GAME].tracked)) GAME = "overall";
  if (PLAYER) {
    const ctx = buildPlayerContext(PLAYER);
    container.append(buildFunFacts(ctx), buildSummaryStrip(PLAYER));
  }
  // Today's Action landing (U4): Everyone + Overall only, any time window
  if (GAME === "overall" && !PLAYER) container.append(buildTodayCard());
  if (GAME === "overall") renderOverall(container);
  else renderGameBoard(container, GAME, DATA.games[GAME]);
  if (PLAYER && GAME === "dailytens") buildPlayerBlocks(container, buildPlayerContext(PLAYER));
}

// ∞ portal (dropdowns/portal plan U3): the header button that swaps into
// the play area. The glow means something — a valid saved round (checked at
// build time via loadValidRound) upgrades the pulse and adds a dot badge,
// so "come finish your round" is visible from the scoreboard.
function buildPortal() {
  const live = !!loadValidRound();
  const btn = el("button", {
    class: "portal" + (live ? " live" : ""), type: "button",
    "aria-label": "Play Infinite Tens",
  });
  btn.append(el("span", { "aria-hidden": "true", text: "∞" }));
  if (live) btn.append(el("span", { class: "dot", "aria-hidden": "true" }));
  btn.onclick = goPlay;
  return btn;
}

function render() {
  const app = $("#app");
  app.textContent = "";
  // full render == area-level navigation: a pending puzzle pick belongs to
  // the give-up confirm it armed, and must never survive into the next area
  PENDING_START = null;
  BANK_OPEN = false; // area switch closes the answer bank
  if (VIEW === "play" && !catalogAvailable()) VIEW = "stats"; // no archive, no play area
  if (VIEW !== "play") VIEW = "stats"; // unknown values land on stats
  // document.title stays the static brand: the tab title and browser history
  // are plaintext surfaces the privacy tests can't observe at runtime, so the
  // group name never goes there (game plan U7).
  const hdr = el("div", { class: "hdr" });
  const h1 = el("h1", { class: "wordmark" });
  const container = el("div", { id: "view" });
  const updated = el("div", { class: "dim num", text: DATA.group + " · updated " + DATA.updated });
  if (VIEW === "play") {
    // play-area header: the one ∞ on screen moves into the wordmark; the way
    // back is explicit. GAME/PLAYER/WIN are untouched by area switches, so
    // the exact stats view is restored on return.
    h1.append(el("span", { class: "mark", text: "∞" }), " Infinite Tens");
    const back = el("button", { class: "btn", type: "button", text: "← Statistics" });
    back.onclick = () => { VIEW = "stats"; render(); };
    hdr.append(h1, back);
    app.append(hdr, updated, container);
    renderPlay(container);
  } else {
    h1.append("Statistics");
    const actions = el("div", { class: "hdr-actions" });
    if (catalogAvailable()) actions.append(buildPortal()); // no archive → no doorway
    actions.append(buildSettings());
    hdr.append(h1, actions);
    app.append(hdr, updated, buildControls(), container);
    renderStats(container);
  }
}

$("#unlock").onclick = async () => {
  const btn = $("#unlock"), err = $("#lockErr");
  err.textContent = "";
  btn.disabled = true;
  btn.textContent = "Unlocking…";
  try {
    DATA = await decrypt($("#pass").value);
    initAfterDecrypt();
    // Unlock always lands on the stats area — the scoreboard is the front
    // door; Infinite Tens play lives behind the ∞ portal.
    VIEW = "stats";
    // unlock transition is pure CSS, driven by these class toggles: .out
    // fades/scales the lock away (ending visibility:hidden via `forwards`;
    // display:none under prefers-reduced-motion), and #app:not(.hidden)
    // runs its fade-up entrance as it becomes visible.
    $("#lock").classList.add("out");
    $("#app").classList.remove("hidden");
    render();
  } catch (e) {
    err.textContent = "Wrong passcode — try again";
    $("#pass").value = "";
  } finally {
    btn.disabled = false;
    btn.textContent = "Unlock";
  }
};
$("#pass").addEventListener("keydown", e => { if (e.key === "Enter") $("#unlock").click(); });
</script>
</body>
